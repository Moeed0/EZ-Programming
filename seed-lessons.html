<!DOCTYPE html>
<html>

<head>
    <title>Seed Lessons - Fixed</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 30px;
            background: #f8fafc;
        }

        button {
            padding: 15px 30px;
            font-size: 18px;
            background: #2563eb;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
        }

        button:hover {
            background: #1d4ed8;
        }

        #status {
            margin-top: 20px;
            padding: 15px;
            background: #f1f5f9;
            border-radius: 8px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <h1>Seed Lessons with Full Content</h1>
    <button id="seedBtn">🌱 Seed All 10 Lessons (Fixed)</button>
    <div id="status"></div>

    <script type="module">
        import { createLesson } from './js/auth.js';

        const lessons = [
            {
                title: 'Hello World in Python',
                topic: 'Introduction',
                difficulty: 'beginner',
                orderIndex: 1,
                isPublished: true,
                isHidden: false,
                content: `<h2>Welcome to Python!</h2><p>Python is a popular, easy-to-learn programming language used for web development, data science, automation, and more.</p><p>Let's start with the most famous first program.</p>`,
                starterCode: `print("Hello World")`,
                hint: 'Use the print() function to display text on the screen.'
            },
            {
                title: 'Variables and Data Types',
                topic: 'Basics',
                difficulty: 'beginner',
                orderIndex: 2,
                isPublished: true,
                isHidden: false,
                content: `<h2>Variables and Data Types</h2><p>Variables are containers for storing data. Python is dynamically typed, so you don't need to declare types.</p>`,
                starterCode: `name = "Abdul"\nage = 20\nheight = 5.9\nis_student = True\nprint(name, age, height, is_student)`,
                hint: 'Use = to assign values. Common types: str, int, float, bool.'
            },
            {
                title: 'Conditional Statements',
                topic: 'Control Flow',
                difficulty: 'beginner',
                orderIndex: 3,
                isPublished: true,
                isHidden: false,
                content: `<h2>Conditional Statements (if, elif, else)</h2><p>Conditionals let your program make decisions based on conditions.</p>`,
                starterCode: `score = 85\nif score >= 90:\n    print("Excellent")\nelif score >= 70:\n    print("Good")\nelse:\n    print("Needs improvement")`,
                hint: 'Use if, elif, and else to control program flow.'
            },
            {
                title: 'Loops - For and While',
                topic: 'Control Flow',
                difficulty: 'intermediate',
                orderIndex: 4,
                isPublished: true,
                isHidden: false,
                content: `<h2>Loops in Python</h2><p>Loops allow you to execute code repeatedly. for loops are great for iterating over sequences.</p>`,
                starterCode: `for i in range(1, 6):\n    print("Count:", i)`,
                hint: 'Use range() with for loops or while for condition-based loops.'
            },
            {
                title: 'Functions in Python',
                topic: 'Functions',
                difficulty: 'intermediate',
                orderIndex: 5,
                isPublished: true,
                isHidden: false,
                content: `<h2>Functions</h2><p>Functions are reusable blocks of code that perform a specific task.</p>`,
                starterCode: `def greet(name, age):\n    return f"Hello {name}, you are {age} years old."\nprint(greet("Ali", 21))`,
                hint: 'Define functions using the def keyword.'
            },
            {
                title: 'Lists and Tuples',
                topic: 'Data Structures',
                difficulty: 'intermediate',
                orderIndex: 6,
                isPublished: true,
                isHidden: false,
                content: `<h2>Lists and Tuples</h2><p>Lists are mutable (can be changed), tuples are immutable.</p>`,
                starterCode: `fruits = ["apple", "banana", "cherry"]\nfruits.append("mango")\nprint(fruits)\nprint(len(fruits))`,
                hint: 'Use [] for lists and () for tuples.'
            },
            {
                title: 'Dictionaries (Key-Value)',
                topic: 'Data Structures',
                difficulty: 'intermediate',
                orderIndex: 7,
                isPublished: true,
                isHidden: false,
                content: `<h2>Dictionaries</h2><p>Dictionaries store data as key-value pairs and are very fast for lookups.</p>`,
                starterCode: `student = {\n    "name": "Abdul",\n    "age": 22,\n    "course": "Python"\n}\nprint(student["name"])\nprint(student.get("grade", "Not assigned"))`,
                hint: 'Use curly braces {} and key-value pairs.'
            },
            {
                title: 'List Comprehensions',
                topic: 'Advanced Basics',
                difficulty: 'intermediate',
                orderIndex: 8,
                isPublished: true,
                isHidden: false,
                content: `<h2>List Comprehensions</h2><p>A concise and Pythonic way to create new lists.</p>`,
                starterCode: `squares = [x**2 for x in range(10)]\neven_squares = [x**2 for x in range(10) if x % 2 == 0]\nprint(squares)\nprint(even_squares)`,
                hint: 'List comprehensions are written inside square brackets.'
            },
            {
                title: 'Error Handling (Try/Except)',
                topic: 'Error Handling',
                difficulty: 'intermediate',
                orderIndex: 9,
                isPublished: true,
                isHidden: false,
                content: `<h2>Error Handling</h2><p>Use try/except to handle errors gracefully without crashing the program.</p>`,
                starterCode: `try:\n    result = 10 / 0\nexcept ZeroDivisionError:\n    print("Cannot divide by zero!")\nexcept Exception as e:\n    print("An error occurred:", e)`,
                hint: 'Wrap risky code in try block and handle errors in except.'
            },
            {
                title: 'File I/O Basics',
                topic: 'File Handling',
                difficulty: 'advanced',
                orderIndex: 10,
                isPublished: true,
                isHidden: false,
                content: `<h2>File Input and Output</h2><p>Reading from and writing to files is a fundamental skill.</p>`,
                starterCode: `with open("sample.txt", "w") as f:\n    f.write("Hello from Python File Handling!")\n\nwith open("sample.txt", "r") as f:\n    content = f.read()\n    print(content)`,
                hint: 'Use open() with "r" for reading and "w" for writing.'
            }
        ];



        document.getElementById('seedBtn').onclick = async () => {
            const status = document.getElementById('status');
            status.textContent = 'Seeding...';

            for (const lesson of lessons) {
                await createLesson(lesson);
                console.log('Seeded:', lesson.title);
            }
            status.textContent = '✅ All lessons seeded successfully!';
            alert('Seeding Complete!');
        };
    </script>
</body>

</html>
