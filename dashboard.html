<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your learning dashboard - browse lessons and track progress.">
  <title>Dashboard - EZ Programming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Dashboard Content -->
  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <div style="display: flex; justify-content: space-between; align-items: center; width: 100%;">
        <div>
          <h1 id="welcomeText" style="margin-bottom: 4px;">My Lessons</h1>
          <p class="text-secondary">Browse available lessons and track your learning. Click a lesson to begin!</p>
        </div>
      </div>

      <!-- User Profile Card (Top Right) -->
      <div style="display: flex; justify-content: flex-end; margin-top: 16px;">
        <div class="card" style="padding: 12px 20px; min-width: 260px; display: flex; align-items: center; gap: 16px; background-color: white; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
          <div style="width: 44px; height: 44px; border-radius: 50%; background-color: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.125rem;" id="userInitials">?</div>
          <div style="overflow: hidden;">
            <h4 style="margin: 0; font-size: 0.9375rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="profileName">Loading...</h4>
            <p style="margin: 0; font-size: 0.75rem; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="profileEmail">...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress Bar -->
    <div class="progress-bar-container">
      <div class="progress-header">
        <span id="progressLabel">Overall Progress</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width: 0%"></div>
      </div>
    </div>

    <!-- Lessons Grid -->
    <div id="lessonsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading lessons...</p>
      </div>
    </div>
    <p id="loadError" style="display:none; text-align:center; color: var(--color-error); font-size:.8125rem; margin:8px 0;"></p>

    <!-- Debug Panel — fixed bottom-right, always in DOM, toggle with header bar -->
    <div id="debugPanel" class="debug-panel">
      <div id="toggleDebugBtn" class="debug-panel-header" title="Click to collapse/expand">
        <span>Diagnostics</span>
        <span id="debugToggleIcon">&#9660;</span>
      </div>
      <div id="debugLog"></div>
    </div>

    <!-- Footer -->
    <div id="footer"></div>

    <script type="module">
      import { renderNavbar, renderFooter, showToast } from './js/navbar.js?v=1.1';
      import { onAuthChange, apiRequest, getCurrentUser, getUserProfile, createUserProfileIfMissing, getProgress } from './js/auth.js?v=1.1';

      renderNavbar('dashboard');
      renderFooter();

      // ── Build inline debug panel (visible by default — no DOM element needed) ────
      var _dbgPadding = 16;
      var _dbgVisible = true;
      var _dbgMaxLines = 60;

      function D(msg, type) {
        type = type || 'info';
        var ts  = new Date().toLocaleTimeString('en-GB', { hour12: false });
        var cls = type === 'err' ? 'log-error'
                : type === 'warn' ? 'log-warn'
                : type === 'ok'   ? 'log-success'
                : 'log-info';
        var el  = document.getElementById('debugLog');
        if (el) {
          el.innerHTML = '<div class="log-entry ' + cls + '">[' + ts + '] ' + msg + '</div>' + el.innerHTML;
          var lines = el.querySelectorAll('.log-entry');
          if (lines.length > _dbgMaxLines) { lines[_dbgMaxLines].remove(); }
          if (el.scrollHeight > 240) el.scrollTop = el.scrollHeight - 240;
        }
        console.log('[Dash]', msg);
      }

      function toggleDebug() {
        _dbgVisible = !_dbgVisible;
        document.getElementById('debugPanel').style.display = _dbgVisible ? 'flex' : 'none';
        var icon = document.getElementById('debugToggleIcon');
        if (icon) icon.textContent = _dbgVisible ? '\u25BC' : '\u25B2';
        D(_dbgVisible ? 'Debug panel SHOWN (toggle)' : 'Debug panel HIDDEN (toggle)');
      }

      document.getElementById('toggleDebugBtn').addEventListener('click', toggleDebug);

      // ── Catch all unhandled errors ──────────────────────────────────────────
      window.addEventListener('error', function(e) {
        D('UNCAUGHT ERROR: ' + e.message + ' @ ' + (e.filename || '') + ':' + (e.lineno || ''), 'err');
      });
      window.addEventListener('unhandledrejection', function(e) {
        D('UNHANDLED REJECTION: ' + (e.reason && (e.reason.message || e.reason)), 'err');
      });


      // Sample lessons (fallback when Firestore lessons collection is empty)
      var sampleLessons = [
        {id:'lesson-1',title:'Hello World in Python',topic:'Introduction',difficulty:'beginner',orderIndex:1,isPublished:true},
        {id:'lesson-2',title:'Variables and Data Types',topic:'Basics',difficulty:'beginner',orderIndex:2,isPublished:true},
        {id:'lesson-3',title:'Conditional Statements',topic:'Control Flow',difficulty:'beginner',orderIndex:3,isPublished:true},
        {id:'lesson-4',title:'Loops - For and While',topic:'Control Flow',difficulty:'intermediate',orderIndex:4,isPublished:true},
        {id:'lesson-5',title:'Functions in Python',topic:'Functions',difficulty:'intermediate',orderIndex:5,isPublished:true},
        {id:'lesson-6',title:'Lists and Tuples',topic:'Data Structures',difficulty:'intermediate',orderIndex:6,isPublished:true},
        {id:'lesson-7',title:'Dictionaries (Key-Value)',topic:'Data Structures',difficulty:'intermediate',orderIndex:7,isPublished:true},
        {id:'lesson-8',title:'List Comprehensions',topic:'Advanced Basics',difficulty:'intermediate',orderIndex:8,isPublished:true},
        {id:'lesson-9',title:'Error Handling (Try/Except)',topic:'Error Handling',difficulty:'intermediate',orderIndex:9,isPublished:true},
        {id:'lesson-10',title:'File I/O Basics',topic:'File Handling',difficulty:'advanced',orderIndex:10,isPublished:true}
      ];

      var userProgress = {};

      /**
       * Load lessons from Firestore or fall back to sampleLessons.
       */
      async function loadLessons() {
        D('loadLessons() — calling apiRequest(/api/lessons)');
        try {
          var data  = await apiRequest('/api/lessons');
          var list  = data.lessons || (Array.isArray(data) ? data : []);
          list      = list.length ? list : sampleLessons;
          D('loadLessons() — ' + list.length + ' lessons returned');
          return list;
        } catch(err) {
          D('loadLessons() FAILED: ' + err.message + ' — using sampleLessons', 'warn');
          return sampleLessons;
        }
      }

      /**
       * Load user progress from Firestore.
       * Returns an ARRAY of {lessonId, userId, status, ...} objects.
       * The caller (onAuthChange / refreshProgressOnShow) stores
       * the result into userProgress as an array.
       */
      // ── Normalise progress array → {lessonId: status} map ──────────────────
      function normaliseProgress(items) {
        var map = {};
        if (Array.isArray(items)) {
          items.forEach(function(p) {
            if (p && p.lessonId && p.status) { map[String(p.lessonId)] = String(p.status); }
          });
        }
        return map;
      }

      async function loadProgressFromFirestore() {
        var user = getCurrentUser();
        if (!user) { D('loadProgressFromFirestore — getCurrentUser() returned null', 'warn'); return []; }
        D('loadProgressFromFirestore | uid: ' + user.uid, 'info');
        var t0 = Date.now();
        try {
          const progress = await getProgress();
          D('loadProgressFromFirestore — ' + progress.length + ' items in ' + (Date.now() - t0) + 'ms', 'ok');
          return progress;
        } catch(err) {
          D('loadProgressFromFirestore FAILED: ' + (err.code||'') + ' ' + (err.message||err), 'err');
          console.error('[Dash] loadProgressFromFirestore error:', err);
          return [];
        }
      }

      /**
       * Update progress bar width + percentage label.
       */
      function updateProgressBar(completedCount, totalLessons) {
        var pct = totalLessons > 0 ? Math.round(completedCount / totalLessons * 100) : 0;
        var fill = document.getElementById('progressFill');
        var lbl  = document.getElementById('progressPercent');
        if (fill) fill.style.width = pct + '%';
        if (lbl)  lbl.textContent  = pct + '%';
        D('progressBar: ' + completedCount + '/' + totalLessons + ' = ' + pct + '%');
      }

      /**
       * Build lesson-card HTML and update the progress bar.
       */
      function renderLessons(lessons) {
        var container = document.getElementById('lessonsContainer');
        var done      = Object.values(userProgress).filter(function(s) { return s === 'completed'; }).length;
        var total     = lessons.length;

        updateProgressBar(done, total);
        D('renderLessons — ' + total + ' cards | completed=' + done);

        if (lessons.length === 0) {
          container.innerHTML = '<div class="text-center" style="padding:60px 24px;"><p class="text-secondary">No lessons yet.</p></div>';
          return;
        }

        container.innerHTML = '<div class="lessons-grid">' + lessons.map(function(l) {
          var lid = String(l.id);
          var s   = userProgress[lid] || '';
          var st  = '', sc = '';
          if (s === 'completed')       { st = 'Completed';  sc = 'completed'; }
          else if (s === 'in-progress'){ st = 'In Progress'; sc = 'in-progress'; }
          var b = l.difficulty === 'beginner' ? 'badge-beginner'
                : l.difficulty === 'intermediate' ? 'badge-intermediate'
                : 'badge-advanced';
        return '<a href="lesson.html?id=' + l.id + '" style="text-decoration:none">'
            + '<div class="card lesson-card card-clickable">'
            + '  <span class="lesson-card-badge ' + b + '">' + l.difficulty + '</span>'
            + '  <h3>' + l.title + '</h3><p>' + l.topic + '</p>'
            + (st ? '<span class="lesson-card-status ' + sc + '">' + st + '</span>'
                  : '<span class="lesson-card-status" style="color:var(--color-text-secondary)">Not started</span>')
            + '</div></a>';
        }).join('') + '</div>';
      }

      // ── Init on page load (handles already-authed sessions) ──────────────────────
      async function initDashboard() {
        try {
          var user = getCurrentUser();
          if (!user) {
            D('initDashboard — no user, waiting for auth...', 'warn');
            onAuthChange(async function(u) {
              if (u) runAuthFlow(u);
            });
            return;
          }
          runAuthFlow(user);
        } catch(err) {
          D('initDashboard FATAL: ' + err.message, 'err');
          console.error(err);
          alert('Dashboard Error: ' + err.message);
        }
      }

      async function runAuthFlow(user) {
        D('runAuthFlow — uid: ' + user.uid, 'ok');
        document.getElementById('welcomeText').textContent = 'My Lessons';

        getUserProfile(user.uid).then(function(profile) {
          if (profile) {
            D('profile loaded — name=' + (profile.name || 'User'), 'ok');
            document.getElementById('profileName').textContent  = profile.name  || 'User';
            document.getElementById('profileEmail').textContent = user.email;
            document.getElementById('userInitials').textContent = (profile.name || 'U').charAt(0).toUpperCase();
          } else {
            D('profile null — showing Learner', 'warn');
            document.getElementById('profileName').textContent  = 'Learner';
            document.getElementById('profileEmail').textContent = user.email;
          }
        }).catch(function(e) {
          D('getUserProfile FAILED: ' + e.message, 'warn');
          document.getElementById('profileName').textContent  = 'Learner';
          document.getElementById('profileEmail').textContent = user.email;
        });

        var lessonsAndProgress = await Promise.all([loadLessons(), loadProgressFromFirestore()]);
        userProgress          = normaliseProgress(lessonsAndProgress[1]);
        D('userProgress map: ' + JSON.stringify(userProgress), 'ok');
        renderLessons(lessonsAndProgress[0]);
      }

      // ── 8-second dashboard init watchdog ────────────────────────────────────
      var _dashTimer = setTimeout(function() {
        var u = getCurrentUser();
        D('WATCHDOG: dashboard init timed out. auth=' + (u ? u.uid : 'null')
          + ' progress=' + JSON.stringify(userProgress)
          + ' lessons_rendered='
          + (document.querySelectorAll('.lesson-card').length || 0), 'err');
        var errEl = document.getElementById('loadError');
        if (errEl) {
          errEl.style.display = 'block';
          errEl.textContent = 'Dashboard took too long to load. Check console for details, or refresh the page.';
        }
      }, 8000);

      // ── Refresh on page visibility / back-button / lesson-complete event ─────────
      async function refreshProgressOnShow() {
        var user = getCurrentUser();
        if (!user) return;
        D('refreshProgressOnShow — pageshow / back-button / progress-updated event');
        userProgress = normaliseProgress(await loadProgressFromFirestore());
        var lessons  = await loadLessons();
        renderLessons(lessons);
      }

      // Kick off dashboard init (must come after all function defs)
      initDashboard();

      window.addEventListener('pageshow',            refreshProgressOnShow);
      window.addEventListener('progress-updated',    refreshProgressOnShow);
      window.addEventListener('storage', function(e) {
        if (e.key && e.key.indexOf('progress_') === 0) refreshProgressOnShow();
      });
    </script>
  </body>
</html>
