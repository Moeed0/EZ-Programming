<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard - EZ Programming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="navbar"></div>

  <div class="dashboard-container">

    <!-- Header row: title + user card -->
    <div class="dash-toprow">
      <div>
        <h1 class="dash-title">My Lessons</h1>
        <p class="dash-subtitle">Browse available lessons and track your learning.</p>
      </div>
      <div class="user-profile-card">
        <div class="user-avatar" id="userInitials">?</div>
        <div class="user-info">
          <div class="user-name" id="profileName">Loading...</div>
          <div class="user-email" id="profileEmail">...</div>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar-container">
      <div class="progress-header">
        <span>Overall Progress</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill" style="width:0%"></div>
      </div>
    </div>

    <!-- Lessons grid -->
    <div id="lessonsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading lessons...</p>
      </div>
    </div>

  </div>

  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter } from './js/navbar.js?v=1.3';
    import {
      onAuthChange,
      apiRequest,
      getCurrentUser,
      getUserProfile,
      getProgress
    } from './js/auth.js?v=1.2';

    renderNavbar('dashboard');
    renderFooter();

    let userProgress = {};

    async function loadLessons() {
      try {
        const data = await apiRequest('/api/lessons');
        return data?.lessons || [];
      } catch (err) {
        console.error('[Dashboard] loadLessons:', err.message);
        return [];
      }
    }

    async function loadProgress() {
      try {
        const progress = await getProgress();
        const map = {};
        if (Array.isArray(progress)) {
          progress.forEach(p => { if (p.lessonId && p.status) map[p.lessonId] = p.status; });
        }
        return map;
      } catch (err) {
        console.error('[Dashboard] loadProgress:', err.message);
        return {};
      }
    }

    function updateProgressBar(lessons) {
      const total = lessons.length;
      const done  = lessons.filter(l => userProgress[l.id] === 'completed').length;
      const pct   = total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0;
      document.getElementById('progressFill').style.width = pct + '%';
      document.getElementById('progressPercent').textContent = pct + '%';
    }

    function renderLessons(lessons) {
      const container = document.getElementById('lessonsContainer');

      if (!lessons.length) {
        container.innerHTML = '<p class="no-lessons">No lessons available yet.</p>';
        updateProgressBar([]);
        return;
      }

      container.innerHTML = `<div class="lessons-grid">${
        lessons.map(lesson => {
          const status = userProgress[lesson.id] || '';
          const statusHTML =
            status === 'completed'
              ? '<span class="lesson-card-status completed">Completed</span>'
              : status === 'in-progress'
                ? '<span class="lesson-card-status in-progress">In Progress</span>'
                : '<span class="lesson-card-status" style="color:var(--color-text-muted)">Not Started</span>';

          const badgeClass =
            lesson.difficulty === 'beginner'     ? 'badge-beginner' :
            lesson.difficulty === 'intermediate' ? 'badge-intermediate' : 'badge-advanced';

          return `
            <a href="lesson.html?id=${lesson.id}" style="text-decoration:none;display:block;">
              <div class="lesson-card">
                <span class="lesson-card-badge ${badgeClass}">${lesson.difficulty}</span>
                <h3>${lesson.title}</h3>
                <p>${lesson.topic}</p>
                ${statusHTML}
              </div>
            </a>`;
        }).join('')
      }</div>`;

      updateProgressBar(lessons);
    }

    async function loadProfile(user) {
      try {
        const profile = await getUserProfile(user.uid);
        document.getElementById('profileName').textContent = profile?.name || 'Learner';
        document.getElementById('profileEmail').textContent = user.email || '';
        document.getElementById('userInitials').textContent = (profile?.name || 'U').charAt(0).toUpperCase();
      } catch (e) {
        console.error('[Dashboard] loadProfile:', e.message);
      }
    }

    async function startDashboard(user) {
      await loadProfile(user);
      const [lessons, progress] = await Promise.all([loadLessons(), loadProgress()]);
      userProgress = progress;
      renderLessons(lessons);
    }

    async function initDashboard() {
      try {
        const user = getCurrentUser();
        if (!user) {
          onAuthChange(async u => { if (u) await startDashboard(u); });
          return;
        }
        await startDashboard(user);
      } catch (err) {
        console.error('[Dashboard] init:', err.message);
      }
    }

    window.addEventListener('pageshow', async () => {
      const user = getCurrentUser();
      if (user) {
        userProgress = await loadProgress();
        const lessons = await loadLessons();
        renderLessons(lessons);
      }
    });

    initDashboard();
  </script>

  <style>
    /* Dashboard-specific styles */
    .dash-toprow {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 28px;
    }

    .dash-title {
      font-size: 1.75rem;
      font-weight: 800;
      color: var(--color-text);
      margin-bottom: 4px;
      line-height: 1.2;
    }

    .dash-subtitle {
      color: var(--color-text-secondary);
      font-size: 0.95rem;
    }

    .no-lessons {
      text-align: center;
      color: var(--color-text-muted);
      padding: 60px 20px;
    }
  </style>
</body>

</html>
