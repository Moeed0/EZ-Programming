<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your learning dashboard - browse lessons and track progress." />

  <title>Dashboard - EZ Programming</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .dashboard-header {
      margin-bottom: 24px;
    }

    .text-secondary {
      color: #64748b;
    }

    .progress-bar-container {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 30px;
      border: 1px solid #e2e8f0;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.3s ease;
    }

    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .lesson-card {
      padding: 20px;
      border-radius: 14px;
      background: white;
      border: 1px solid #e2e8f0;
      transition: 0.25s ease;
      height: 100%;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .lesson-card h3 {
      margin: 14px 0 10px;
      color: #0f172a;
    }

    .lesson-card p {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    .lesson-card-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .badge-beginner {
      background: #dcfce7;
      color: #166534;
    }

    .badge-intermediate {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-advanced {
      background: #fee2e2;
      color: #991b1b;
    }

    .lesson-card-status {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .completed {
      color: #16a34a;
    }

    .in-progress {
      color: #2563eb;
    }

    .loading-container {
      text-align: center;
      padding: 50px 20px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .debug-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 340px;
      max-height: 420px;
      background: #0f172a;
      color: white;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 9999;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .debug-panel-header {
      padding: 12px 14px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 600;
    }

    #debugLog {
      overflow-y: auto;
      padding: 10px;
      font-size: 0.8rem;
      max-height: 260px;
    }

    .log-entry {
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }

    .log-success {
      color: #4ade80;
    }

    .log-error {
      color: #f87171;
    }

    .log-warn {
      color: #facc15;
    }

    .log-info {
      color: #cbd5e1;
    }

    .seed-btn {
      margin: 10px;
      padding: 12px;
      background: #2563eb;
      color: white;
      border: none;
      border-radius: 8px;
      font-weight: 600;
      cursor: pointer;
      width: calc(100% - 20px);
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Main Dashboard -->
  <div class="dashboard-container">
    <div class="dashboard-header">
      <div
        style="display: flex; justify-content: space-between; align-items: center; width: 100%; gap: 20px; flex-wrap: wrap;">
        <div>
          <h1 id="welcomeText" style="margin-bottom: 6px;">My Lessons</h1>
          <p class="text-secondary">Browse available lessons and track your learning.</p>
        </div>
      </div>

      <!-- User Card -->
      <div style="display:flex; justify-content:flex-end; margin-top:20px;">
        <div class="card"
          style="padding: 14px 18px; min-width: 260px; display:flex; align-items:center; gap:14px; background:white; border:1px solid #E2E8F0; border-radius:14px;">
          <div id="userInitials"
            style="width:48px; height:48px; border-radius:50%; background:#2563eb; color:white; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:1.1rem;">
            ?</div>
          <div style="overflow:hidden;">
            <h4 id="profileName"
              style="margin:0; font-size:0.95rem; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
              Loading...</h4>
            <p id="profileEmail"
              style="margin:0; font-size:0.78rem; color:#64748b; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;">
              ...</p>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar-container">
      <div class="progress-header">
        <span>Overall Progress</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Lessons -->
    <div id="lessonsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading lessons...</p>
      </div>
    </div>

    <p id="loadError" style="display:none; text-align:center; color:red; margin-top:12px;"></p>
  </div>

  <!-- Debug Panel with Seed Button -->
  <div id="debugPanel" class="debug-panel">
    <div id="toggleDebugBtn" class="debug-panel-header">
      <span>Diagnostics</span>
      <span id="debugToggleIcon">▼</span>
    </div>

    <div style="padding:10px;">
      <button id="seedLessonsBtn" class="seed-btn">🌱 Seed Sample Lessons (1-10)</button>
    </div>

    <div id="debugLog"></div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter } from './js/navbar.js?v=1.2';
    import {
      onAuthChange,
      apiRequest,
      getCurrentUser,
      getUserProfile,
      getProgress,
      createLesson
    } from './js/auth.js?v=1.2';

    renderNavbar('dashboard');
    renderFooter();

    let debugVisible = true;
    let userProgress = {};

    // Debug Logger
    function D(message, type = 'info') {
      const log = document.getElementById('debugLog');
      const time = new Date().toLocaleTimeString();
      const div = document.createElement('div');
      div.className = `log-entry ${type === 'err' ? 'log-error' : type === 'warn' ? 'log-warn' : type === 'ok' ? 'log-success' : 'log-info'}`;
      div.textContent = `[${time}] ${message}`;
      if (log) {
        log.prepend(div);
        if (log.children.length > 80) log.lastChild.remove();
      }
      console.log('[Dashboard]', message);
    }

    // Toggle Debug Panel
    document.getElementById('toggleDebugBtn').addEventListener('click', () => {
      debugVisible = !debugVisible;
      document.getElementById('debugLog').style.display = debugVisible ? 'block' : 'none';
      document.getElementById('debugToggleIcon').textContent = debugVisible ? '▼' : '▲';
    });

    // ==================== SEED BUTTON ====================
    document.getElementById('seedLessonsBtn').addEventListener('click', async () => {
      if (!confirm("Seed 10 sample lessons? This will add them to Firestore.")) return;
      D('Starting seeding process...', 'warn');

      const lessons = [
        { title: 'Hello World in Python', topic: 'Introduction', difficulty: 'beginner', orderIndex: 1, isPublished: true, isHidden: false, content: '<h2>Welcome to Python!</h2><p>Python is a popular, easy-to-learn language used for web development, data science, and automation.</p>', starterCode: 'print("Hello World")', hint: 'Use the print() function to display text on the screen.' },
        { title: 'Variables and Data Types', topic: 'Basics', difficulty: 'beginner', orderIndex: 2, isPublished: true, isHidden: false, content: '<h2>Variables and Data Types</h2><p>Variables store data. Python is dynamically typed - no need to declare types.</p>', starterCode: 'name = "Abdul"\nage = 20\nheight = 5.9\nis_student = True\nprint(name, age, height, is_student)', hint: 'Use = to assign. Types: str, int, float, bool.' },
        { title: 'Conditional Statements', topic: 'Control Flow', difficulty: 'beginner', orderIndex: 3, isPublished: true, isHidden: false, content: '<h2>Conditionals (if, elif, else)</h2><p>Let your program make decisions based on conditions.</p>', starterCode: 'score = 85\nif score >= 90:\n    print("Excellent")\nelif score >= 70:\n    print("Good")\nelse:\n    print("Needs improvement")', hint: 'Use if, elif, and else to control flow.' },
        { title: 'Loops - For and While', topic: 'Control Flow', difficulty: 'intermediate', orderIndex: 4, isPublished: true, isHidden: false, content: '<h2>Loops in Python</h2><p>Loops execute code repeatedly. for loops iterate over sequences.</p>', starterCode: 'for i in range(1, 6):\n    print("Count:", i)', hint: 'Use range() with for loops. Use while for condition-based loops.' },
        { title: 'Functions in Python', topic: 'Functions', difficulty: 'intermediate', orderIndex: 5, isPublished: true, isHidden: false, content: '<h2>Functions</h2><p>Reusable blocks of code that perform a specific task.</p>', starterCode: 'def greet(name, age):\n    return f"Hello {name}, you are {age} years old."\nprint(greet("Ali", 21))', hint: 'Define functions with the def keyword.' },
        { title: 'Lists and Tuples', topic: 'Data Structures', difficulty: 'intermediate', orderIndex: 6, isPublished: true, isHidden: false, content: '<h2>Lists and Tuples</h2><p>Lists are mutable (can change), tuples are immutable.</p>', starterCode: 'fruits = ["apple", "banana", "cherry"]\nfruits.append("mango")\nprint(fruits)\nprint(len(fruits))', hint: 'Use [] for lists, () for tuples.' },
        { title: 'Dictionaries (Key-Value)', topic: 'Data Structures', difficulty: 'intermediate', orderIndex: 7, isPublished: true, isHidden: false, content: '<h2>Dictionaries</h2><p>Store data as key-value pairs. Very fast for lookups.</p>', starterCode: 'student = {\n    "name": "Abdul",\n    "age": 22,\n    "course": "Python"\n}\nprint(student["name"])\nprint(student.get("grade", "Not assigned"))', hint: 'Use curly braces {} with key: value pairs.' },
        { title: 'List Comprehensions', topic: 'Advanced Basics', difficulty: 'intermediate', orderIndex: 8, isPublished: true, isHidden: false, content: '<h2>List Comprehensions</h2><p>A concise, Pythonic way to create new lists.</p>', starterCode: 'squares = [x**2 for x in range(10)]\neven_squares = [x**2 for x in range(10) if x % 2 == 0]\nprint(squares)\nprint(even_squares)', hint: 'List comprehensions go inside square brackets.' },
        { title: 'Error Handling (Try/Except)', topic: 'Error Handling', difficulty: 'intermediate', orderIndex: 9, isPublished: true, isHidden: false, content: '<h2>Error Handling</h2><p>Use try/except to handle errors without crashing.</p>', starterCode: 'try:\n    result = 10 / 0\nexcept ZeroDivisionError:\n    print("Cannot divide by zero!")\nexcept Exception as e:\n    print("Error:", e)', hint: 'Wrap risky code in try, catch errors in except.' },
        { title: 'File I/O Basics', topic: 'File Handling', difficulty: 'advanced', orderIndex: 10, isPublished: true, isHidden: false, content: '<h2>File Input and Output</h2><p>Reading from and writing to files is a fundamental skill.</p>', starterCode: 'with open("sample.txt", "w") as f:\n    f.write("Hello from Python!")\n\nwith open("sample.txt", "r") as f:\n    print(f.read())', hint: 'Use open() with "r" to read and "w" to write.' }
      ];

      try {
        for (const lesson of lessons) {
          await createLesson(lesson);
          D(`Seeded: ${lesson.title}`, 'ok');
        }
        D('All 10 lessons seeded!', 'ok');
        alert('All 10 lessons seeded successfully!');
        userProgress = await loadProgress();
        const freshLessons = await loadLessons();
        renderLessons(freshLessons);
      } catch (err) {
        D(`Seeding failed: ${err.message}`, 'err');
        alert('Seeding failed. Check the Diagnostics panel.');
      }
    });

    // Global Error Handlers
    window.addEventListener('error', (e) => D(`ERROR: ${e.message}`, 'err'));
    window.addEventListener('unhandledrejection', (e) => D(`PROMISE ERROR: ${e.reason}`, 'err'));

    // Load Lessons
    async function loadLessons() {
      D('Loading lessons from Firestore...');
      try {
        const data = await apiRequest('/api/lessons');
        const lessons = data?.lessons || [];
        D(`Loaded ${lessons.length} lessons`, 'ok');
        return lessons;
      } catch (err) {
        D(`Failed to load lessons: ${err.message}`, 'err');
        return [];
      }
    }

    // Load Progress
    async function loadProgress() {
      try {
        const progress = await getProgress();
        const map = {};
        if (Array.isArray(progress)) {
          progress.forEach(p => {
            if (p.lessonId && p.status) {
              map[p.lessonId] = p.status;
            }
          });
        }
        D(`Progress loaded: ${Object.keys(map).length} entries`, 'ok');
        return map;
      } catch (error) {
        D(`Progress load error: ${error.message}`, 'warn');
        return {};
      }
    }

    // Update Progress Bar
    function updateProgressBar(lessons) {
      const total = lessons.length;
      const done = lessons.filter(l => userProgress[l.id] === 'completed').length;
      const percent = total > 0 ? Math.min(100, Math.round((done / total) * 100)) : 0;
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';
      D(`Progress: ${done}/${total} = ${percent}%`, 'ok');
    }

    // Render Lessons
    function renderLessons(lessons) {
      const container = document.getElementById('lessonsContainer');

      if (!lessons.length) {
        container.innerHTML = `<p style="text-align:center; color:#64748b; padding:60px;">No lessons yet. Use the Seed button below.</p>`;
        updateProgressBar([]);
        return;
      }

      container.innerHTML = `
        <div class="lessons-grid">
          ${lessons.map(lesson => {
            const status = userProgress[lesson.id] || '';
            let statusHTML = status === 'completed'
              ? '<span class="lesson-card-status completed">Completed</span>'
              : status === 'in-progress'
                ? '<span class="lesson-card-status in-progress">In Progress</span>'
                : '<span class="lesson-card-status" style="color:#94a3b8;">Not Started</span>';

            const badgeClass = lesson.difficulty === 'beginner' ? 'badge-beginner' :
              lesson.difficulty === 'intermediate' ? 'badge-intermediate' : 'badge-advanced';

            return `
              <a href="lesson.html?id=${lesson.id}" style="text-decoration:none;">
                <div class="lesson-card">
                  <span class="lesson-card-badge ${badgeClass}">${lesson.difficulty}</span>
                  <h3>${lesson.title}</h3>
                  <p>${lesson.topic}</p>
                  ${statusHTML}
                </div>
              </a>
            `;
          }).join('')}
        </div>`;

      updateProgressBar(lessons);
    }

    // Load Profile
    async function loadProfile(user) {
      try {
        const profile = await getUserProfile(user.uid);
        document.getElementById('profileName').textContent = profile?.name || 'Learner';
        document.getElementById('profileEmail').textContent = user.email || '';
        document.getElementById('userInitials').textContent = (profile?.name || 'U').charAt(0).toUpperCase();
      } catch (e) {
        D(`Profile error: ${e.message}`, 'warn');
      }
    }

    // Start Dashboard
    async function startDashboard(user) {
      D(`User logged in: ${user.uid}`, 'ok');
      await loadProfile(user);
      const [lessons, progress] = await Promise.all([loadLessons(), loadProgress()]);
      userProgress = progress;
      renderLessons(lessons);
      D('Dashboard ready', 'ok');
    }

    // Init
    async function initDashboard() {
      try {
        D('Initializing dashboard...');
        const user = getCurrentUser();
        if (!user) {
          onAuthChange(async (u) => { if (u) await startDashboard(u); });
          return;
        }
        await startDashboard(user);
      } catch (error) {
        D(`Init error: ${error.message}`, 'err');
      }
    }

    // Refresh after returning from lesson
    window.addEventListener('pageshow', async () => {
      const user = getCurrentUser();
      if (user) {
        userProgress = await loadProgress();
        const lessons = await loadLessons();
        renderLessons(lessons);
      }
    });

    initDashboard();
  </script>
</body>

</html>
