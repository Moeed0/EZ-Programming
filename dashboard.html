<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Your learning dashboard - browse lessons and track progress." />

  <title>Dashboard - EZ Programming</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Main CSS -->
  <link rel="stylesheet" href="css/style.css" />

  <style>
    .dashboard-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .dashboard-header {
      margin-bottom: 24px;
    }

    .text-secondary {
      color: #64748b;
    }

    .progress-bar-container {
      background: white;
      border-radius: 12px;
      padding: 18px;
      margin-bottom: 30px;
      border: 1px solid #e2e8f0;
    }

    .progress-header {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .progress-bar {
      width: 100%;
      height: 12px;
      background: #e2e8f0;
      border-radius: 999px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      width: 0%;
      background: #2563eb;
      transition: width 0.3s ease;
    }

    .lessons-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 20px;
    }

    .lesson-card {
      padding: 20px;
      border-radius: 14px;
      background: white;
      border: 1px solid #e2e8f0;
      transition: 0.25s ease;
      height: 100%;
    }

    .lesson-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.08);
    }

    .card-clickable {
      cursor: pointer;
    }

    .lesson-card h3 {
      margin: 14px 0 10px;
      color: #0f172a;
    }

    .lesson-card p {
      color: #64748b;
      font-size: 0.95rem;
      margin-bottom: 14px;
    }

    .lesson-card-badge {
      display: inline-block;
      padding: 6px 12px;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: capitalize;
    }

    .badge-beginner {
      background: #dcfce7;
      color: #166534;
    }

    .badge-intermediate {
      background: #fef3c7;
      color: #92400e;
    }

    .badge-advanced {
      background: #fee2e2;
      color: #991b1b;
    }

    .lesson-card-status {
      display: inline-block;
      margin-top: 10px;
      font-size: 0.82rem;
      font-weight: 700;
    }

    .completed {
      color: #16a34a;
    }

    .in-progress {
      color: #2563eb;
    }

    .loading-container {
      text-align: center;
      padding: 50px 20px;
    }

    .spinner {
      width: 42px;
      height: 42px;
      border: 4px solid #e2e8f0;
      border-top: 4px solid #2563eb;
      border-radius: 50%;
      margin: 0 auto 16px;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    .debug-panel {
      position: fixed;
      right: 16px;
      bottom: 16px;
      width: 340px;
      max-height: 320px;
      background: #0f172a;
      color: white;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      z-index: 9999;
      box-shadow: 0 10px 25px rgba(0, 0, 0, 0.25);
    }

    .debug-panel-header {
      padding: 12px 14px;
      background: #1e293b;
      display: flex;
      justify-content: space-between;
      cursor: pointer;
      font-weight: 600;
    }

    #debugLog {
      overflow-y: auto;
      padding: 10px;
      font-size: 0.8rem;
      max-height: 260px;
    }

    .log-entry {
      margin-bottom: 8px;
      line-height: 1.4;
      word-break: break-word;
    }

    .log-success {
      color: #4ade80;
    }

    .log-error {
      color: #f87171;
    }

    .log-warn {
      color: #facc15;
    }

    .log-info {
      color: #cbd5e1;
    }

    @media (max-width: 768px) {
      .dashboard-container {
        padding: 16px;
      }

      .debug-panel {
        width: calc(100% - 32px);
      }
    }
  </style>
</head>

<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Main Dashboard -->
  <div class="dashboard-container">

    <!-- Header -->
    <div class="dashboard-header">
      <div style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          width: 100%;
          gap: 20px;
          flex-wrap: wrap;
        ">
        <div>
          <h1 id="welcomeText" style="margin-bottom: 6px;">My Lessons</h1>
          <p class="text-secondary">
            Browse available lessons and track your learning.
          </p>
        </div>
      </div>

      <!-- User Card -->
      <div style="display:flex; justify-content:flex-end; margin-top:20px;">
        <div class="card" style="
            padding: 14px 18px;
            min-width: 260px;
            display:flex;
            align-items:center;
            gap:14px;
            background:white;
            border:1px solid #E2E8F0;
            border-radius:14px;
          ">
          <div id="userInitials" style="
              width:48px;
              height:48px;
              border-radius:50%;
              background:#2563eb;
              color:white;
              display:flex;
              align-items:center;
              justify-content:center;
              font-weight:700;
              font-size:1.1rem;
            ">
            ?
          </div>

          <div style="overflow:hidden;">
            <h4 id="profileName" style="
                margin:0;
                font-size:0.95rem;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
              ">
              Loading...
            </h4>

            <p id="profileEmail" style="
                margin:0;
                font-size:0.78rem;
                color:#64748b;
                white-space:nowrap;
                overflow:hidden;
                text-overflow:ellipsis;
              ">
              ...
            </p>
          </div>
        </div>
      </div>
    </div>

    <!-- Progress -->
    <div class="progress-bar-container">
      <div class="progress-header">
        <span>Overall Progress</span>
        <span id="progressPercent">0%</span>
      </div>

      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>

    <!-- Lessons -->
    <div id="lessonsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading lessons...</p>
      </div>
    </div>

    <!-- Error -->
    <p id="loadError" style="
        display:none;
        text-align:center;
        color:red;
        margin-top:12px;
      "></p>
  </div>

  <!-- Debug Panel -->
  <div id="debugPanel" class="debug-panel">
    <div id="toggleDebugBtn" class="debug-panel-header">
      <span>Diagnostics</span>
      <span id="debugToggleIcon">▼</span>
    </div>

    <div id="debugLog"></div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script type="module">
    import {
      renderNavbar,
      renderFooter
    } from './js/navbar.js?v=1.1';

    import {
      onAuthChange,
      apiRequest,
      getCurrentUser,
      getUserProfile,
      getProgress
    } from './js/auth.js?v=1.1';

    renderNavbar('dashboard');
    renderFooter();

    // -----------------------------
    // DEBUG LOGGER
    // -----------------------------
    let debugVisible = true;

    function D(message, type = 'info') {
      const log = document.getElementById('debugLog');
      const time = new Date().toLocaleTimeString();

      const div = document.createElement('div');
      div.className = 'log-entry ' + (
        type === 'err' ? 'log-error' :
          type === 'warn' ? 'log-warn' :
            type === 'ok' ? 'log-success' : 'log-info'
      );

      div.textContent = `[${time}] ${message}`;

      if (log) {
        log.prepend(div);
        const entries = log.querySelectorAll('.log-entry');
        if (entries.length > 80) {
          entries[entries.length - 1].remove();
        }
      }
      console.log('[Dashboard]', message);
    }

    // Toggle debug panel
    document.getElementById('toggleDebugBtn').addEventListener('click', () => {
      debugVisible = !debugVisible;
      document.getElementById('debugLog').style.display = debugVisible ? 'block' : 'none';
      document.getElementById('debugToggleIcon').textContent = debugVisible ? '▼' : '▲';
    });

    // Global errors
    window.addEventListener('error', (e) => D(`ERROR: ${e.message}`, 'err'));
    window.addEventListener('unhandledrejection', (e) => D(`PROMISE ERROR: ${e.reason}`, 'err'));

    // -----------------------------
    // LOAD LESSONS (Fixed - No Fallback)
    // -----------------------------
    async function loadLessons() {
      D('loadLessons() — calling apiRequest(/api/lessons)');

      try {
        const data = await apiRequest('/api/lessons');
        const list = data?.lessons || [];
        D(`loadLessons() — ${list.length} lessons returned from Firestore`, 'ok');
        return list;
      } catch (err) {
        D(`loadLessons FAILED: ${err.message}`, 'err');
        return [];
      }
    }

    // -----------------------------
    // LOAD USER PROGRESS
    // -----------------------------
    async function loadProgress() {
      try {
        const progress = await getProgress();
        const map = {};

        if (Array.isArray(progress)) {
          progress.forEach((p) => {
            if (p.lessonId && p.status) {
              map[p.lessonId] = p.status;
            }
          });
        }

        D('Progress loaded successfully', 'ok');
        return map;
      } catch (error) {
        D(`Progress error: ${error.message}`, 'warn');
        return {};
      }
    }

    // -----------------------------
    // UPDATE PROGRESS BAR
    // -----------------------------
    function updateProgressBar(done, total) {
      const percent = total > 0 ? Math.round((done / total) * 100) : 0;
      document.getElementById('progressFill').style.width = percent + '%';
      document.getElementById('progressPercent').textContent = percent + '%';
    }

    // -----------------------------
    // RENDER LESSONS
    // -----------------------------
    function renderLessons(lessons) {
      const container = document.getElementById('lessonsContainer');

      if (!lessons.length) {
        container.innerHTML = '<p style="text-align:center; color:#64748b; padding:40px;">No lessons available yet.</p>';
        return;
      }

      const completed = Object.values(userProgress).filter(s => s === 'completed').length;
      updateProgressBar(completed, lessons.length);

      container.innerHTML = `
        <div class="lessons-grid">
          ${lessons.map(lesson => {
        const status = userProgress[lesson.id] || '';
        let statusHTML = '';

        if (status === 'completed') {
          statusHTML = '<span class="lesson-card-status completed">Completed</span>';
        } else if (status === 'in-progress') {
          statusHTML = '<span class="lesson-card-status in-progress">In Progress</span>';
        } else {
          statusHTML = '<span class="lesson-card-status text-secondary">Not Started</span>';
        }

        const badgeClass = lesson.difficulty === 'beginner' ? 'badge-beginner' :
          lesson.difficulty === 'intermediate' ? 'badge-intermediate' : 'badge-advanced';

        return `
              <a href="lesson.html?id=${lesson.id}" style="text-decoration:none;">
                <div class="lesson-card card-clickable">
                  <span class="lesson-card-badge ${badgeClass}">
                    ${lesson.difficulty}
                  </span>
                  <h3>${lesson.title}</h3>
                  <p>${lesson.topic}</p>
                  ${statusHTML}
                </div>
              </a>
            `;
      }).join('')}
        </div>`;
    }

    let userProgress = {};

    // -----------------------------
    // LOAD PROFILE
    // -----------------------------
    async function loadProfile(user) {
      try {
        const profile = await getUserProfile(user.uid);
        document.getElementById('profileName').textContent = profile?.name || 'Learner';
        document.getElementById('profileEmail').textContent = user.email || '';
        document.getElementById('userInitials').textContent = (profile?.name || 'U').charAt(0).toUpperCase();
      } catch (error) {
        D(`Profile error: ${error.message}`, 'warn');
        document.getElementById('profileName').textContent = 'Learner';
        document.getElementById('profileEmail').textContent = user.email || '';
      }
    }

    // -----------------------------
    // MAIN INIT
    // -----------------------------
    async function initDashboard() {
      try {
        D('Initializing dashboard...');

        let user = getCurrentUser();

        if (!user) {
          D('Waiting for authentication...', 'warn');
          onAuthChange(async (u) => {
            if (u) await startDashboard(u);
          });
          return;
        }

        await startDashboard(user);
      } catch (error) {
        D(`Dashboard init failed: ${error.message}`, 'err');
        document.getElementById('loadError').style.display = 'block';
        document.getElementById('loadError').textContent = error.message;
      }
    }

    async function startDashboard(user) {
      D(`User logged in: ${user.uid}`, 'ok');
      await loadProfile(user);

      const [lessons, progress] = await Promise.all([
        loadLessons(),
        loadProgress()
      ]);

      userProgress = progress;
      renderLessons(lessons);

      D('Dashboard loaded successfully', 'ok');
    }

    // Refresh on page show (after returning from lesson)
    window.addEventListener('pageshow', async () => {
      const user = getCurrentUser();
      if (!user) return;

      userProgress = await loadProgress();
      const lessons = await loadLessons();
      renderLessons(lessons);
    });

    // Start the app
    initDashboard();
  </script>
</body>

</html>
