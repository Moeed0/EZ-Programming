<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Your learning dashboard - browse lessons and track progress.">
  <title>Dashboard - EZ Programming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Dashboard Content -->
  <div class="dashboard-container">
    <!-- Header -->
    <div class="dashboard-header">
      <div style="display: flex; align-items: center; justify-content: space-between; gap: 24px; flex-wrap: wrap; margin-bottom: 32px;">
        <div>
          <h1 id="welcomeText" style="margin-bottom: 4px;">My Lessons</h1>
          <p class="text-secondary">Browse available lessons and track your learning progress.</p>
        </div>
        
        <!-- User Profile Card (Top Right) -->
        <div class="card" style="padding: 12px 20px; min-width: 260px; display: flex; align-items: center; gap: 16px; background-color: white; border: 1px solid #E2E8F0; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);">
          <div style="width: 44px; height: 44px; border-radius: 50%; background-color: var(--color-primary); color: white; display: flex; align-items: center; justify-content: center; font-weight: 700; font-size: 1.125rem;" id="userInitials">?</div>
          <div style="overflow: hidden;">
            <h4 style="margin: 0; font-size: 0.9375rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="profileName">Loading...</h4>
            <p style="margin: 0; font-size: 0.75rem; color: var(--color-text-secondary); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;" id="profileEmail">...</p>
          </div>
        </div>
      </div>
    </div>

<!-- Progress Bar Removed as per user request -->

    <!-- Lessons Grid -->
    <div id="lessonsContainer">
      <div class="loading-container">
        <div class="spinner"></div>
        <p>Loading lessons...</p>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter, showToast } from './js/navbar.js?v=1.5';
    import { onAuthChange, apiRequest, getCurrentUser, getUserProfile } from './js/auth.js?v=1.5';

    renderNavbar('dashboard');
    renderFooter();

    // Sample lessons data (used when backend is not available)
    const sampleLessons = [
      {
        id: 'lesson-1',
        title: 'Hello World in Python',
        topic: 'Introduction',
        difficulty: 'beginner',
        orderIndex: 1,
        isPublished: true
      },
      {
        id: 'lesson-2',
        title: 'Variables and Data Types',
        topic: 'Basics',
        difficulty: 'beginner',
        orderIndex: 2,
        isPublished: true
      },
      {
        id: 'lesson-3',
        title: 'Conditional Statements',
        topic: 'Control Flow',
        difficulty: 'beginner',
        orderIndex: 3,
        isPublished: true
      },
      {
        id: 'lesson-4',
        title: 'Loops - For and While',
        topic: 'Control Flow',
        difficulty: 'intermediate',
        orderIndex: 4,
        isPublished: true
      },
      {
        id: 'lesson-5',
        title: 'Functions in Python',
        topic: 'Functions',
        difficulty: 'intermediate',
        orderIndex: 5,
        isPublished: true
      },
      {
        id: 'lesson-6',
        title: 'Lists and Tuples',
        topic: 'Data Structures',
        difficulty: 'intermediate',
        orderIndex: 6,
        isPublished: true
      },
      {
        id: 'lesson-7',
        title: 'Dictionaries (Key-Value)',
        topic: 'Data Structures',
        difficulty: 'intermediate',
        orderIndex: 7,
        isPublished: true
      },
      {
        id: 'lesson-8',
        title: 'List Comprehensions',
        topic: 'Advanced Basics',
        difficulty: 'intermediate',
        orderIndex: 8,
        isPublished: true
      },
      {
        id: 'lesson-9',
        title: 'Error Handling (Try/Except)',
        topic: 'Error Handling',
        difficulty: 'intermediate',
        orderIndex: 9,
        isPublished: true
      },
      {
        id: 'lesson-10',
        title: 'File I/O basics',
        topic: 'File Handling',
        difficulty: 'advanced',
        orderIndex: 10,
        isPublished: true
      }
    ];

    let userProgress = {};

    /**
     * Load lessons from API or use sample data
     */
    async function loadLessons() {
      try {
        const data = await apiRequest('/api/lessons');
        return data.lessons.length > 0 ? data.lessons : sampleLessons;
      } catch (error) {
        console.log('Using sample lessons data:', error.message);
        return sampleLessons;
      }
    }

    /**
     * Load user progress from API
     */
    async function loadProgress(user) {
      try {
        if (!user) return {};

        const data = await apiRequest('/api/progress');
        const progressMap = {};
        
        console.log('Progress data received:', data.progress);
        
        if (data && data.progress) {
          data.progress.forEach(p => {
            // Force status to string and handle both numeric/string IDs
            progressMap[String(p.lessonId)] = String(p.status);
          });
        }
        return progressMap;
      } catch (error) {
        console.error('Could not load progress:', error);
        return {};
      }
    }

    /**
     * Render lesson cards
     */
    function renderLessons(lessons) {
      const container = document.getElementById('lessonsContainer');
      const completedCount = Object.values(userProgress).filter(s => s === 'completed').length;
      const totalLessons = lessons.length;
      const progressPercent = totalLessons > 0 ? Math.round((completedCount / totalLessons) * 100) : 0;

      // Update progress bar
      document.getElementById('progressText').textContent = `${progressPercent}%`;
      document.getElementById('progressFill').style.width = `${progressPercent}%`;

      if (lessons.length === 0) {
        container.innerHTML = `
          <div class="text-center" style="padding: 60px 24px;">
            <p class="text-secondary">No lessons available yet. Check back soon!</p>
          </div>
        `;
        return;
      }

      const cardsHTML = lessons.map(lesson => {
        const lessonId = String(lesson.id);
        const status = userProgress[lessonId] || '';
        let statusText = '';
        let statusClass = '';

        if (status === 'completed') {
          statusText = 'Completed';
          statusClass = 'completed';
        } else if (status === 'in-progress') {
          statusText = 'In Progress';
          statusClass = 'in-progress';
        }

        const badgeClass = lesson.difficulty === 'beginner' ? 'badge-beginner' :
                           lesson.difficulty === 'intermediate' ? 'badge-intermediate' : 'badge-advanced';

        return `
          <a href="lesson.html?id=${lesson.id}" style="text-decoration: none;">
            <div class="card lesson-card card-clickable">
              <span class="lesson-card-badge ${badgeClass}">${lesson.difficulty}</span>
              <h3>${lesson.title}</h3>
              <p>${lesson.topic}</p>
              ${statusText ? `<span class="lesson-card-status ${statusClass}">${statusText}</span>` : `<span class="lesson-card-status" style="color: var(--color-text-secondary);">Not started</span>`}
            </div>
          </a>
        `;
      }).join('');

      container.innerHTML = `<div class="lessons-grid">${cardsHTML}</div>`;
    }

    // Initialize dashboard
    onAuthChange(async (user) => {
      try {
        if (user) {
          document.getElementById('welcomeText').textContent = 'My Lessons';
          
          // Load User Profile
          getUserProfile(user.uid).then(profile => {
            if (profile) {
              document.getElementById('profileName').textContent = profile.name || 'User';
              document.getElementById('profileEmail').textContent = user.email;
              document.getElementById('userInitials').textContent = (profile.name || 'U').charAt(0).toUpperCase();
            } else {
              document.getElementById('profileName').textContent = 'Learner';
              document.getElementById('profileEmail').textContent = user.email;
            }
          }).catch(apiErr => console.error('Profile load error:', apiErr));

          userProgress = await loadProgress(user);
        } else {
          window.location.href = 'login.html';
        }

        const lessons = await loadLessons();
        renderLessons(lessons);
        
        // Diagnostic toast
        if (Object.keys(userProgress).length > 0) {
          showToast(`Cloud Sync: ${Object.keys(userProgress).length} items found.`, 'success');
        } else {
          showToast("Cloud Sync: No progress found yet.", "info");
        }
      } catch (fatalError) {
        console.error('Core Dashboard Error:', fatalError);
        alert('Dashboard Init Error: ' + fatalError.message);
      }
    });
  </script>
</body>
</html>
