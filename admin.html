<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel - EZ Programming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Admin Content -->
  <div class="admin-container">
    <div class="admin-header">
      <h1>Lesson Management</h1>
      <div style="display: flex; gap: 8px; align-items: center;">
        <button class="btn btn-primary" id="openAddModalBtn">+ Add New Lesson</button>
        <button class="btn btn-outline" onclick="runBackfill()" title="Fix existing lessons missing isHidden field">🔄 Backfill isHidden</button>
      </div>
    </div>

    <!-- Lessons Table -->
    <table class="admin-table">
      <thead>
        <tr>
          <th>Order</th>
          <th>Title</th>
          <th>Topic</th>
          <th>Status</th>
          <th>Visibility</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody id="adminLessonsTable">
        <!-- Rows will be injected here -->
      </tbody>
    </table>
  </div>

  <!-- Add/Edit Lesson Modal -->
  <div class="modal-overlay" id="lessonModal">
    <div class="modal">
      <h2 id="modalTitle">Add New Lesson</h2>
      <form id="lessonForm">
        <input type="hidden" id="lessonId">

        <div class="form-group">
          <label class="form-label" for="title">Title</label>
          <input class="form-input" type="text" id="title" required>
        </div>

        <div style="display: flex; gap: 16px;">
          <div class="form-group" style="flex: 1;">
            <label class="form-label" for="topic">Topic Category</label>
            <input class="form-input" type="text" id="topic" required>
          </div>
          <div class="form-group" style="flex: 1;">
            <label class="form-label" for="difficulty">Difficulty</label>
            <select class="form-input" id="difficulty">
              <option value="beginner">Beginner</option>
              <option value="intermediate">Intermediate</option>
              <option value="advanced">Advanced</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label class="form-label" for="orderIndex">Order Index (1, 2, 3...)</label>
          <input class="form-input" type="number" id="orderIndex" required min="1">
        </div>

        <div class="form-group">
          <label class="form-label" for="content">Lesson Content (Markdown/HTML)</label>
          <textarea class="form-input" id="content" rows="4"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label" for="starterCode">Starter Code</label>
          <textarea class="form-input" id="starterCode" rows="4" style="font-family: monospace;"></textarea>
        </div>

        <div class="form-group">
          <label class="form-label">
            <input type="checkbox" id="isPublished"> Publish immediately
          </label>
        </div>

        <div class="modal-actions">
          <button type="button" class="btn btn-outline" id="closeModalBtn">Cancel</button>
          <button type="submit" class="btn btn-primary" id="saveLessonBtn">Save Lesson</button>
        </div>
      </form>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter, showToast } from './js/navbar.js?v=1.0';
    import { onAuthChange, apiRequest, getCurrentUser, getUserProfile,
             createUserProfileIfMissing, toggleHide,
             backfillIsHiddenOnLessons } from './js/auth.js?v=1.0';

    renderNavbar('admin');
    renderFooter();

    const lessonModal = document.getElementById('lessonModal');
    const lessonForm  = document.getElementById('lessonForm');
    const tableBody   = document.getElementById('adminLessonsTable');

    // Make functions globally available for inline onclick handlers
    window.editLesson        = editLesson;
    window.deleteLesson      = deleteLesson;
    window.togglePublish     = togglePublish;
    window.toggleHide        = toggleHide;
    window.runBackfill       = runBackfill;

    let lessons = [];

    /**
     * Guard: redirect non-admin users away from this page.
     * Reads the role from Firestore (users/{uid}.role).
     * Only users with role === 'admin' pass through.
     */
    onAuthChange(async (user) => {
      if (!user) {
        window.location.href = '/login.html';
        return;
      }

      try {
        // Always bootstrap the profile so it exists even if signup failed to write it
        await createUserProfileIfMissing(user.uid);

        const profile = await getUserProfile(user.uid);
        const role    = (profile && profile.role) || 'student';

        if (role !== 'admin') {
          showToast('Admin access required. Redirecting to dashboard.', 'error');
          setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
          return;
        }

        loadAdminLessons();
      } catch (err) {
        console.error('Admin auth check failed:', err);
        showToast('Failed to verify admin access.', 'error');
        setTimeout(() => { window.location.href = '/dashboard.html'; }, 1500);
      }
    });

    /**
    * Fetches all lessons from Firestore
    * called ONLY by a real admin user
    */
    async function loadLessonsFromFirestore() {
      try {
        const data = await apiRequest('/api/lessons?admin=true');
        return data.lessons;
      } catch (err) {
        console.error('Failed to load lessons:', err);
        return [];
      }
    }

    /**
     * Load lessons for admin table — merges Firestore result with sample-lessons fallback
     */
    async function loadAdminLessons() {
      try {
        // 1. Sync isHidden field on existing docs (admin-only; no-op if already migrated)
        try { await backfillIsHiddenOnLessons(); } catch(_) {}

        var data     = await apiRequest('/api/lessons?admin=true');
        // apiRequest('/api/lessons?admin=true') returns { lessons: [...] }
        var firestore = (data && data.lessons) || [];

        // 2. Build a map of existing Firestore lesson IDs
        var existingIds = {};
        firestore.forEach(function(l) { existingIds[String(l.id)] = true; });

        // 3. Merge: keep all Firestore lessons, then append any sample lessons NOT already present
        var merged = firestore.slice(0);
        _sampleLessons.forEach(function(sl) {
          if (!existingIds[String(sl.id)]) merged.push({ ...sl, _source: 'sample' });
        });

        lessons = merged;
        renderTable();
      } catch (error) {
        console.error('Failed to load lessons:', error);
        // Absolute last resort: show sample lessons
        lessons = _sampleLessons.map(function(s) { return { ...s, _source: 'sample' }; });
        renderTable();
      }
    }

    /* built-in sample lessons (same list as in auth.js) */
    var _sampleLessons = [
      {id:'lesson-1',title:'Hello World in Python',topic:'Introduction',difficulty:'beginner',orderIndex:1,isPublished:true,isHidden:false},
      {id:'lesson-2',title:'Variables and Data Types',topic:'Basics',difficulty:'beginner',orderIndex:2,isPublished:true,isHidden:false},
      {id:'lesson-3',title:'Conditional Statements',topic:'Control Flow',difficulty:'beginner',orderIndex:3,isPublished:true,isHidden:false},
      {id:'lesson-4',title:'Loops - For and While',topic:'Control Flow',difficulty:'intermediate',orderIndex:4,isPublished:true,isHidden:false},
      {id:'lesson-5',title:'Functions in Python',topic:'Functions',difficulty:'intermediate',orderIndex:5,isPublished:true,isHidden:false},
      {id:'lesson-6',title:'Lists and Tuples',topic:'Data Structures',difficulty:'intermediate',orderIndex:6,isPublished:true,isHidden:false},
      {id:'lesson-7',title:'Dictionaries (Key-Value)',topic:'Data Structures',difficulty:'intermediate',orderIndex:7,isPublished:true,isHidden:false},
      {id:'lesson-8',title:'List Comprehensions',topic:'Advanced Basics',difficulty:'intermediate',orderIndex:8,isPublished:true,isHidden:false},
      {id:'lesson-9',title:'Error Handling (Try/Except)',topic:'Error Handling',difficulty:'intermediate',orderIndex:9,isPublished:true,isHidden:false},
      {id:'lesson-10',title:'File I/O Basics',topic:'File Handling',difficulty:'advanced',orderIndex:10,isPublished:true,isHidden:false}
    ];

    /**
     * Render the admin lessons table
     */
    function renderTable() {
      if (lessons.length === 0) {
        tableBody.innerHTML = `<tr><td colspan="6" class="text-center">No lessons found. Click "+ Add New Lesson" to create the first one.</td></tr>`;
        return;
      }

      tableBody.innerHTML = lessons.map(lesson => `
        <tr>
          <td style="font-weight: 600;">${lesson.orderIndex || 0}</td>
          <td><strong>${lesson.title}</strong></td>
          <td>${lesson.topic}</td>
          <td>
            <span class="status-badge ${lesson.isPublished ? 'status-published' : 'status-draft'}">
              ${lesson.isPublished ? 'Published' : 'Draft'}
            </span>
          </td>
          <td>
            <span class="status-badge ${!lesson.isHidden ? 'status-published' : 'status-draft'}"
                  style="${lesson.isHidden ? 'opacity:0.55;' : ''}"
                  title="isHidden: ${!!lesson.isHidden}">
              ${!lesson.isHidden ? 'Visible' : 'Hidden'}
            </span>
          </td>
          <td>
            <div class="admin-actions">
              <button class="btn btn-sm btn-outline" onclick="editLesson('${lesson.id}')">Edit</button>
              <button class="btn btn-sm ${lesson.isPublished ? 'btn-outline' : 'btn-secondary'}"
                      onclick="togglePublish('${lesson.id}', ${!lesson.isPublished})">
                ${lesson.isPublished ? 'Unpublish' : 'Publish'}
              </button>
              <button class="btn btn-sm ${lesson.isHidden ? 'btn-outline' : 'btn-secondary'}"
                      onclick="toggleHide('${lesson.id}', ${!lesson.isHidden})"
                      title="${lesson.isHidden ? 'Make visible to students' : 'Hide from students'}">
                ${lesson.isHidden ? 'Unhide' : 'Hide'}
              </button>
              <button class="btn btn-sm btn-danger" onclick="deleteLesson('${lesson.id}')">Delete</button>
            </div>
          </td>
        </tr>
      `).join('');
    }

    // Modal behavior
    document.getElementById('openAddModalBtn').addEventListener('click', () => {
      lessonForm.reset();
      document.getElementById('lessonId').value = '';
      document.getElementById('modalTitle').textContent = 'Add New Lesson';
      lessonModal.classList.add('active');
    });

    document.getElementById('closeModalBtn').addEventListener('click', () => {
      lessonModal.classList.remove('active');
    });

    /**
     * Handle form submit (Create or Update)
     */
    lessonForm.addEventListener('submit', async (e) => {
      e.preventDefault();
      const saveBtn = document.getElementById('saveLessonBtn');
      saveBtn.disabled = true;
      saveBtn.textContent = 'Saving...';

      const lessonId = document.getElementById('lessonId').value;
      const payload = {
        title: document.getElementById('title').value,
        topic: document.getElementById('topic').value,
        difficulty: document.getElementById('difficulty').value,
        orderIndex: parseInt(document.getElementById('orderIndex').value),
        isPublished: document.getElementById('isPublished').checked,
        content: document.getElementById('content').value,
        starterCode: document.getElementById('starterCode').value,
      };

      try {
        if (lessonId) {
          // Update
          await apiRequest(`/api/lessons/${lessonId}`, {
            method: 'PUT',
            body: JSON.stringify(payload)
          });
          showToast('Lesson updated successfully', 'success');
        } else {
          // Create
          await apiRequest('/api/lessons', {
            method: 'POST',
            body: JSON.stringify(payload)
          });
          showToast('Lesson created successfully', 'success');
        }

        lessonModal.classList.remove('active');
        await loadAdminLessons();
      } catch (error) {
        showToast(error.message, 'error');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = 'Save Lesson';
      }
    });

    /**
     * Delete a lesson and ALL its progress records for every user
     */
    async function deleteLesson(id) {
      if (!confirm('Are you sure you want to delete this lesson? This cannot be undone.')) return;

      try {
        await apiRequest(`/api/lessons/${id}`, { method: 'DELETE' });
        showToast('Lesson deleted. Student progress for this lesson has also been removed.', 'success');
        await loadAdminLessons();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    /**
     * Toggle lesson publish state
     */
    async function togglePublish(id, isPublished) {
      try {
        await apiRequest(`/api/lessons/${id}`, {
          method: 'PUT',
          body: JSON.stringify({ isPublished })
        });
        showToast(isPublished ? 'Lesson published' : 'Lesson unpublished', 'success');
        await loadAdminLessons();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    /**
     * Toggle isHidden flag on a lesson.
     * true  → lesson disappears from every student dashboard immediately.
     * false → lesson re-appears in student dashboards as before.
     */
    async function toggleHide(id, isHidden) {
      try {
        await apiRequest(`/api/lessons/${id}`, {
          method: 'POST',
          body: JSON.stringify({ isHidden: !!isHidden })
        });
        showToast(isHidden ? 'Lesson hidden — students will not see it' : 'Lesson unhidden — students can see it again', 'success');
        await loadAdminLessons();
      } catch (error) {
        showToast(error.message, 'error');
      }
    }

    /**
     * Ensure every lesson doc has the isHidden field (backfill for docs created before isHidden was added).
     * Safe to call any number of times.
     */
    async function runBackfill() {
      try {
        showToast('Backfilling isHidden — check the debug panel for progress...', 'info');
        var result = await backfillIsHiddenOnLessons();
        showToast('isHidden backfill done. Updated ' + result.updated + ' of ' + result.scanned + ' lessons.', 'success');
        await loadAdminLessons();
      } catch (error) {
        showToast('Backfill failed: ' + error.message, 'error');
      }
    }

    /**
     * Open edit modal with lesson data
     */
    async function editLesson(id) {
      try {
        const data = await apiRequest(`/api/lessons/${id}`);
        const { lesson, sections, exercises } = data;

        document.getElementById('lessonId').value = lesson.id;
        document.getElementById('title').value = lesson.title || '';
        document.getElementById('topic').value = lesson.topic || '';
        document.getElementById('difficulty').value = lesson.difficulty || 'beginner';
        document.getElementById('orderIndex').value = lesson.orderIndex || 1;
        document.getElementById('isPublished').checked = lesson.isPublished || false;

        if (sections && sections.length > 0) {
          document.getElementById('content').value = sections[0].content || '';
        }

        if (exercises && exercises.length > 0) {
          document.getElementById('starterCode').value = exercises[0].starterCode || '';
        }

        document.getElementById('modalTitle').textContent = 'Edit Lesson';
        lessonModal.classList.add('active');
      } catch (error) {
        showToast('Failed to load lesson details', 'error');
      }
    }
  </script>
</body>
</html>
