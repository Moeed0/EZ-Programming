<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Admin Panel - EZ Programming</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- NAVBAR -->
  <div id="navbar"></div>

  <!-- ADMIN -->
  <div class="admin-container">

    <div class="admin-header">

      <h1>Lesson Management</h1>

      <div style="display:flex; gap:10px;">

        <button class="btn btn-primary" id="openAddModalBtn">
          + Add New Lesson
        </button>

        <button class="btn btn-outline" onclick="runBackfill()">
          Backfill isHidden
        </button>

      </div>

    </div>

    <!-- TABLE -->
    <table class="admin-table">

      <thead>

        <tr>
          <th>Order</th>
          <th>Title</th>
          <th>Topic</th>
          <th>Difficulty</th>
          <th>Status</th>
          <th>Visibility</th>
          <th>Actions</th>
        </tr>

      </thead>

      <tbody id="adminLessonsTable"></tbody>

    </table>

  </div>

  <!-- MODAL -->
  <div class="modal-overlay" id="lessonModal">

    <div class="modal">

      <h2 id="modalTitle">Add New Lesson</h2>

      <form id="lessonForm">

        <input type="hidden" id="lessonId">

        <!-- TITLE -->
        <div class="form-group">

          <label class="form-label">
            Title
          </label>

          <input type="text" class="form-input" id="title" required>

        </div>

        <!-- TOPIC + DIFFICULTY -->
        <div style="display:flex; gap:16px;">

          <div class="form-group" style="flex:1;">

            <label class="form-label">
              Topic
            </label>

            <input type="text" class="form-input" id="topic" required>

          </div>

          <div class="form-group" style="flex:1;">

            <label class="form-label">
              Difficulty
            </label>

            <select id="difficulty" class="form-input">

              <option value="beginner">
                Beginner
              </option>

              <option value="intermediate">
                Intermediate
              </option>

              <option value="advanced">
                Advanced
              </option>

            </select>

          </div>

        </div>

        <!-- ORDER -->
        <div class="form-group">

          <label class="form-label">
            Order Index
          </label>

          <input type="number" class="form-input" id="orderIndex" min="1" required>

        </div>

        <!-- CONTENT -->
        <div class="form-group">

          <label class="form-label">
            Lesson Content
          </label>

          <textarea class="form-input" id="content" rows="6"></textarea>

        </div>

        <!-- STARTER CODE -->
        <div class="form-group">

          <label class="form-label">
            Starter Code
          </label>

          <textarea class="form-input" id="starterCode" rows="6" style="font-family:monospace;"></textarea>

        </div>

        <!-- PUBLISH OPTION -->
        <div class="form-group">

          <label class="form-label">

            <input type="checkbox" id="isPublished">

            Publish Lesson

          </label>

        </div>

        <!-- HIDE OPTION -->
        <div class="form-group">

          <label class="form-label">

            <input type="checkbox" id="isHidden">

            Hide Lesson

          </label>

        </div>

        <!-- ACTIONS -->
        <div class="modal-actions">

          <button type="button" class="btn btn-outline" id="closeModalBtn">
            Cancel
          </button>

          <button type="submit" class="btn btn-primary" id="saveLessonBtn">
            Save Lesson
          </button>

        </div>

      </form>

    </div>

  </div>

  <!-- FOOTER -->
  <div id="footer"></div>

  <script type="module">

    import {
      renderNavbar,
      renderFooter,
      showToast
    } from './js/navbar.js';

    import {

      onAuthChange,
      getUserProfile,
      createUserProfileIfMissing,

      apiRequest,
      backfillIsHiddenOnLessons

    } from './js/auth.js';

    renderNavbar('admin');
    renderFooter();

    const tableBody = document.getElementById('adminLessonsTable');

    const lessonModal = document.getElementById('lessonModal');

    const lessonForm = document.getElementById('lessonForm');

    let lessons = [];

    // =====================================================
    // AUTH CHECK
    // =====================================================

    onAuthChange(async (user) => {

      if (!user) {

        window.location.href = '/login.html';

        return;

      }

      try {

        await createUserProfileIfMissing(user.uid);

        const profile = await getUserProfile(user.uid);

        if (!profile || profile.role !== 'admin') {

          showToast('Admin access required', 'error');

          setTimeout(() => {

            window.location.href = '/dashboard.html';

          }, 1500);

          return;

        }

        await loadAdminLessons();

      } catch (err) {

        console.error(err);

        showToast('Failed to verify admin access', 'error');

      }

    });

    // =====================================================
    // LOAD LESSONS
    // =====================================================

    async function loadAdminLessons() {

      try {

        const data = await apiRequest('/api/lessons?admin=true');

        lessons = data.lessons || [];

        lessons.sort((a, b) => {

          return (a.orderIndex || 0) - (b.orderIndex || 0);

        });

        renderTable();

      } catch (err) {

        console.error(err);

        showToast('Failed to load lessons', 'error');

      }

    }

    // =====================================================
    // RENDER TABLE
    // =====================================================

    function renderTable() {

      if (lessons.length === 0) {

        tableBody.innerHTML = `
          <tr>
            <td colspan="7" class="text-center">
              No lessons found
            </td>
          </tr>
        `;

        return;

      }

      tableBody.innerHTML = lessons.map((lesson) => {

        const isPublished = !!lesson.isPublished;

        const isHidden = !!lesson.isHidden;

        return `

          <tr>

            <td>
              ${lesson.orderIndex || 0}
            </td>

            <td>
              <strong>${escapeHtml(lesson.title || '')}</strong>
            </td>

            <td>
              ${escapeHtml(lesson.topic || '')}
            </td>

            <td>
              ${escapeHtml(lesson.difficulty || '')}
            </td>

            <td>

              <span class="status-badge ${isPublished ? 'status-published' : 'status-draft'}">

                ${isPublished ? 'Published' : 'Draft'}

              </span>

            </td>

            <td>

              <span class="status-badge ${isHidden ? 'status-draft' : 'status-published'}">

                ${isHidden ? 'Hidden' : 'Visible'}

              </span>

            </td>

            <td>

              <div class="admin-actions">

                <button
                  class="btn btn-sm btn-outline"
                  onclick="editLesson('${lesson.id}')"
                >
                  Edit
                </button>

                <button
                  class="btn btn-sm ${isPublished ? 'btn-outline' : 'btn-secondary'}"
                  onclick="togglePublish('${lesson.id}', ${!isPublished})"
                >
                  ${isPublished ? 'Unpublish' : 'Publish'}
                </button>

                <button
                  class="btn btn-sm ${isHidden ? 'btn-outline' : 'btn-secondary'}"
                  onclick="toggleHide('${lesson.id}', ${!isHidden})"
                >
                  ${isHidden ? 'Unhide' : 'Hide'}
                </button>

                <button
                  class="btn btn-sm btn-danger"
                  onclick="deleteLessonById('${lesson.id}')"
                >
                  Delete
                </button>

              </div>

            </td>

          </tr>

        `;

      }).join('');

    }

    // =====================================================
    // SAVE LESSON
    // =====================================================

    lessonForm.addEventListener('submit', async (e) => {

      e.preventDefault();

      const lessonId =
        document.getElementById('lessonId').value;

      const payload = {

        title:
          document.getElementById('title').value.trim(),

        topic:
          document.getElementById('topic').value.trim(),

        difficulty:
          document.getElementById('difficulty').value,

        orderIndex:
          Number(document.getElementById('orderIndex').value),

        content:
          document.getElementById('content').value,

        starterCode:
          document.getElementById('starterCode').value,

        isPublished:
          document.getElementById('isPublished').checked,

        isHidden:
          document.getElementById('isHidden').checked

      };

      try {

        if (lessonId) {

          await apiRequest(`/api/lessons/${lessonId}`, {
            method: 'PUT',
            body: JSON.stringify(payload)
          });

          showToast('Lesson updated', 'success');

        } else {

          await apiRequest('/api/lessons', {
            method: 'POST',
            body: JSON.stringify(payload)
          });

          showToast('Lesson created', 'success');

        }

        lessonModal.classList.remove('active');

        lessonForm.reset();

        await loadAdminLessons();

      } catch (err) {

        console.error(err);

        showToast(err.message, 'error');

      }

    });

    // =====================================================
    // EDIT LESSON
    // =====================================================

    async function editLesson(id) {

      try {

        const data =
          await apiRequest(`/api/lessons/${id}`);

        const lesson = data.lesson;

        document.getElementById('lessonId').value =
          lesson.id;

        document.getElementById('title').value =
          lesson.title || '';

        document.getElementById('topic').value =
          lesson.topic || '';

        document.getElementById('difficulty').value =
          lesson.difficulty || 'beginner';

        document.getElementById('orderIndex').value =
          lesson.orderIndex || 1;

        document.getElementById('content').value =
          lesson.content || '';

        document.getElementById('starterCode').value =
          lesson.starterCode || '';

        document.getElementById('isPublished').checked =
          !!lesson.isPublished;

        document.getElementById('isHidden').checked =
          !!lesson.isHidden;

        document.getElementById('modalTitle').textContent =
          'Edit Lesson';

        lessonModal.classList.add('active');

      } catch (err) {

        console.error(err);

        showToast('Failed to load lesson', 'error');

      }

    }

    // =====================================================
    // DELETE LESSON
    // =====================================================

    async function deleteLessonById(id) {

      const confirmed = confirm(
        'Are you sure you want to permanently delete this lesson?'
      );

      if (!confirmed) return;

      try {

        await apiRequest(`/api/lessons/${id}`, {
          method: 'DELETE'
        });

        lessons = lessons.filter((lesson) => {
          return lesson.id !== id;
        });

        renderTable();

        showToast('Lesson deleted successfully', 'success');

      } catch (err) {

        console.error(err);

        showToast('Failed to delete lesson', 'error');

      }

    }

    // =====================================================
    // PUBLISH / UNPUBLISH
    // =====================================================

    async function togglePublish(id, value) {

      try {

        await apiRequest(`/api/lessons/${id}`, {
          method: 'PUT',
          body: JSON.stringify({
            isPublished: value
          })
        });

        showToast('Lesson updated', 'success');

        await loadAdminLessons();

      } catch (err) {

        console.error(err);

        showToast(err.message, 'error');

      }

    }

    // =====================================================
    // HIDE / UNHIDE
    // =====================================================

    async function toggleHide(id, value) {

      try {

        await apiRequest(`/api/lessons/${id}`, {
          method: 'PUT',
          body: JSON.stringify({
            isHidden: value
          })
        });

        showToast('Visibility updated', 'success');

        await loadAdminLessons();

      } catch (err) {

        console.error(err);

        showToast(err.message, 'error');

      }

    }

    // =====================================================
    // BACKFILL
    // =====================================================

    async function runBackfill() {

      try {

        const result =
          await backfillIsHiddenOnLessons();

        showToast(
          `Updated ${result.updated} lessons`,
          'success'
        );

        await loadAdminLessons();

      } catch (err) {

        console.error(err);

        showToast(err.message, 'error');

      }

    }

    // =====================================================
    // OPEN MODAL
    // =====================================================

    document
      .getElementById('openAddModalBtn')
      .addEventListener('click', () => {

        lessonForm.reset();

        document.getElementById('lessonId').value = '';

        document.getElementById('modalTitle').textContent =
          'Add New Lesson';

        lessonModal.classList.add('active');

      });

    // =====================================================
    // CLOSE MODAL
    // =====================================================

    document
      .getElementById('closeModalBtn')
      .addEventListener('click', () => {

        lessonModal.classList.remove('active');

      });

    // =====================================================
    // ESCAPE HTML
    // =====================================================

    function escapeHtml(str) {

      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');

    }

    // =====================================================
    // GLOBAL FUNCTIONS
    // =====================================================

    window.editLesson = editLesson;

    window.togglePublish = togglePublish;

    window.toggleHide = toggleHide;

    window.deleteLessonById = deleteLessonById;

    window.runBackfill = runBackfill;

  </script>

</body>

</html>
