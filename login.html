<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Log in to your EZ Programming account.">
  <title>Login - EZ Programming</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <!-- Navbar -->
  <div id="navbar"></div>

  <!-- Login Form -->
  <div class="auth-container">
    <div class="card auth-card">
      <h1>Welcome Back</h1>
      <p class="auth-subtitle">Log in to continue learning.</p>

      <form id="loginForm">
        <div class="form-group">
          <label class="form-label" for="email">Email Address</label>
          <input class="form-input" type="email" id="email" placeholder="name@example.com" required>
        </div>

        <div class="form-group">
          <label class="form-label" for="password">Password</label>
          <input class="form-input" type="password" id="password" placeholder="Enter your password" required>
        </div>

        <div style="text-align: right; margin-top: -8px; margin-bottom: 16px;">
          <a href="#" id="forgotPasswordBtn" style="font-size: 0.8125rem; color: var(--color-primary); font-weight: 500;">Forgot Password?</a>
        </div>

        <p id="loginError" class="form-error hidden"></p>

        <button type="submit" class="btn btn-primary btn-lg" style="width: 100%; margin-top: 8px;" id="loginBtn">Log In</button>
      </form>

      <p class="auth-footer">
        Don't have an account? <a href="signup.html">Sign Up</a>
      </p>
    </div>
  </div>

  <!-- Footer -->
  <div id="footer"></div>

  <script type="module">
    import { renderNavbar, renderFooter, showToast } from './js/navbar.js?v=1.0';
    import { loginUser, onAuthChange, resetPassword } from './js/auth.js?v=1.0';

    renderNavbar('login');
    renderFooter();

    // Redirect if already logged in
    onAuthChange((user) => {
      if (user) {
        window.location.href = 'dashboard.html';
      }
    });

    // Handle login form submission
    const form = document.getElementById('loginForm');
    const errorEl = document.getElementById('loginError');
    const loginBtn = document.getElementById('loginBtn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorEl.classList.add('hidden');

      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      try {
        loginBtn.disabled = true;
        loginBtn.textContent = 'Logging in...';

        await loginUser(email, password);
        showToast('Logged in successfully!', 'success');
        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Login error:', error);
        // _friendly is set by auth.js loginUser for all known codes
        errorEl.textContent = error._friendly || 'Something went wrong. Please try again.';
        errorEl.classList.remove('hidden');
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log In';
      }
    });

    // Forgot password handler
    document.getElementById('forgotPasswordBtn').addEventListener('click', async (e) => {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      
      if (!email) {
        showToast('Please enter your email address first.', 'error');
        return;
      }

      try {
        await resetPassword(email);
        showToast('Password reset link sent to your email!', 'success');
      } catch (error) {
        console.error('Reset error:', error);
        showToast('Failed to send reset link. Check your email.', 'error');
      }
    });
  </script>
</body>
</html>
