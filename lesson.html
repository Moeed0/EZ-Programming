<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson - EZ Programming</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .lesson-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .lesson-content-panel {
      padding: 30px;
      overflow-y: auto;
      background: #111827;
    }

    .lesson-editor-panel {
      background: #020617;
      border-left: 1px solid #1e293b;
    }

    .hint-panel {
      margin: 20px 0;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
    }

    .loading {
      text-align: center;
      padding: 50px;
    }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="lesson-container">
    <div class="lesson-content-panel" id="contentArea">
      <div class="loading">Loading lesson...</div>
    </div>

    <div class="lesson-editor-panel">
      <div style="padding:14px 18px; background:#111827; border-bottom:1px solid #1e293b;">
        Python Editor
      </div>
      <div id="editorContainer" style="height:500px;"></div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

  <script type="module">
    import { renderNavbar } from './js/navbar.js?v=1.1';
    import { apiRequest, getCurrentUser, onAuthChange } from './js/auth.js?v=1.1';

    renderNavbar('lesson');

    const lessonId = new URLSearchParams(window.location.search).get('id');

    onAuthChange(async (user) => {
      if (!user || !lessonId) return;
      await loadLesson();
    });

    async function loadLesson() {
      try {
        const data = await apiRequest(`/api/lessons/${lessonId}`);
        if (!data?.lesson) throw new Error("Lesson not found");

        const lesson = data.lesson;
        document.getElementById('contentArea').innerHTML = `
          <a href="dashboard.html" style="color:#60a5fa;">← Back to Dashboard</a>
          <h1>${lesson.title}</h1>
          <p><strong>Topic:</strong> ${lesson.topic} | <strong>Difficulty:</strong> ${lesson.difficulty}</p>
          
          <div style="margin:25px 0; line-height:1.8;">
            ${lesson.content || '<p>No content available.</p>'}
          </div>

          <div class="hint-panel">
            <h3>Hint</h3>
            <p>${lesson.hint || 'No hint available.'}</p>
          </div>
        `;

        console.log("✅ Lesson loaded successfully:", lesson);

      } catch (err) {
        console.error(err);
        document.getElementById('contentArea').innerHTML = `<p style="color:red;">Error: ${err.message}</p>`;
      }
    }
  </script>
</body>

</html>
