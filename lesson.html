<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Lesson - EZ Programming</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="css/style.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: white;
    }

    .lesson-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .lesson-content-panel {
      padding: 30px;
      overflow-y: auto;
      background: #111827;
    }

    .lesson-editor-panel {
      background: #020617;
      border-left: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
    }

    .hint-panel {
      margin: 20px 0;
      padding: 20px;
      background: #1e293b;
      border-radius: 12px;
    }

    .loading {
      text-align: center;
      padding: 50px;
    }

    #editorContainer {
      flex: 1;
      min-height: 500px;
    }

    .editor-toolbar {
      padding: 12px 18px;
      background: #111827;
      border-bottom: 1px solid #1e293b;
      display: flex;
      gap: 10px;
      align-items: center;
    }

    .btn {
      border: none;
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-run {
      background: #2563eb;
      color: white;
    }

    .btn-complete {
      background: #16a34a;
      color: white;
    }

    #output {
      background: black;
      color: #22c55e;
      padding: 14px;
      height: 160px;
      overflow-y: auto;
      font-family: monospace;
      border-top: 1px solid #1e293b;
    }
  </style>
</head>

<body>

  <div id="navbar"></div>

  <div class="lesson-container">

    <!-- LEFT -->
    <div class="lesson-content-panel" id="contentArea">

      <div class="loading">
        Loading lesson...
      </div>

    </div>

    <!-- RIGHT -->
    <div class="lesson-editor-panel">

      <div class="editor-toolbar">

        <strong>Python Editor</strong>

        <button class="btn btn-run" id="runBtn">
          Run Code
        </button>

        <button class="btn btn-complete" id="completeBtn">
          Mark Complete
        </button>

      </div>

      <div id="editorContainer"></div>

      <div id="output">Output will appear here...</div>

    </div>

  </div>

  <!-- MONACO -->
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

  <!-- STABLE PYODIDE -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.js"></script>

  <script type="module">

    import { renderNavbar } from './js/navbar.js?v=1.1';

    import {
      apiRequest,
      updateProgress,
      onAuthChange
    } from './js/auth.js?v=1.1';

    renderNavbar('lesson');

    const lessonId =
      new URLSearchParams(window.location.search).get('id');

    let editor;
    let pyodide;

    // =====================================================
    // AUTH
    // =====================================================

    onAuthChange(async (user) => {

      if (!user || !lessonId) {
        window.location.href = 'login.html';
        return;
      }

      await initEditor();

      await loadLesson();

    });

    // =====================================================
    // INIT MONACO
    // =====================================================

    async function initEditor() {

      return new Promise((resolve) => {

        window.require.config({
          paths: {
            vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs'
          }
        });

        window.require(['vs/editor/editor.main'], function () {

          editor = monaco.editor.create(
            document.getElementById('editorContainer'),
            {
              value: '',
              language: 'python',
              theme: 'vs-dark',
              automaticLayout: true,
              fontSize: 14
            }
          );

          resolve();

        });

      });

    }

    // =====================================================
    // LOAD LESSON
    // =====================================================

    async function loadLesson() {

      try {

        const data =
          await apiRequest(`/api/lessons/${lessonId}`);

        if (!data?.lesson) {
          throw new Error('Lesson not found');
        }

        const lesson = data.lesson;

        document.getElementById('contentArea').innerHTML = `

          <a href="dashboard.html" style="color:#60a5fa;">
            ← Back to Dashboard
          </a>

          <h1>${lesson.title}</h1>

          <p>
            <strong>Topic:</strong> ${lesson.topic}
            |
            <strong>Difficulty:</strong> ${lesson.difficulty}
          </p>

          <div style="margin:25px 0; line-height:1.8;">
            ${lesson.content || '<p>No content available.</p>'}
          </div>

          <div class="hint-panel">
            <h3>Hint</h3>
            <p>${lesson.hint || 'No hint available.'}</p>
          </div>

        `;

        if (editor) {
          editor.setValue(
            lesson.starterCode || ''
          );
        }

        console.log('✅ Lesson loaded:', lesson);

      } catch (err) {

        console.error(err);

        document.getElementById('contentArea').innerHTML = `
          <p style="color:red;">
            Error: ${err.message}
          </p>
        `;
      }
    }

    // =====================================================
    // INIT PYODIDE
    // =====================================================

    async function initPyodide() {

      if (pyodide) return pyodide;

      document.getElementById('output').textContent =
        'Loading Python runtime...';

      pyodide = await loadPyodide();

      document.getElementById('output').textContent =
        'Python ready.';

      return pyodide;

    }

    // =====================================================
    // RUN CODE
    // =====================================================

    document
      .getElementById('runBtn')
      .addEventListener('click', async () => {

        try {

          const py = await initPyodide();

          const code = editor.getValue();

          let output = '';

          py.setStdout({
            batched: (text) => {
              output += text + '\n';
            }
          });

          await py.runPythonAsync(code);

          document.getElementById('output').textContent =
            output || 'Code executed successfully';

        } catch (err) {

          console.error(err);

          document.getElementById('output').textContent =
            err;

        }

      });

    // =====================================================
    // COMPLETE LESSON
    // =====================================================

    document
      .getElementById('completeBtn')
      .addEventListener('click', async () => {

        try {

          await updateProgress(
            lessonId,
            'completed'
          );

          alert('Lesson marked as completed!');

        } catch (err) {

          console.error(err);

          alert('Failed to update progress');

        }

      });

  </script>

</body>

</html>
