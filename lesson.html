<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lesson - EZ Programming</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>
  <div id="navbar"></div>

  <div class="lesson-container">

    <!-- LEFT PANEL: content -->
    <div class="lesson-content-panel" id="contentArea">
      <div class="loading">
        <div class="spinner"></div>
        <p>Loading lesson...</p>
      </div>
    </div>

    <!-- RIGHT PANEL: editor -->
    <div class="lesson-editor-panel">
      <div class="editor-toolbar">
        <span class="editor-label">Python Editor</span>
        <button class="btn-run" id="runBtn">Run Code</button>
        <button class="btn-complete" id="completeBtn">Mark Complete</button>
      </div>
      <div id="editorContainer"></div>
      <div id="output">Output will appear here...</div>
    </div>

  </div>

  <!-- Monaco loader -->
  <script>
    var require = { paths: { vs: 'https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs' } };
  </script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.44.0/min/vs/loader.js"></script>

  <!-- Pyodide -->
  <script type="module">
    import { loadPyodide } from "https://cdn.jsdelivr.net/pyodide/v0.23.4/full/pyodide.mjs";
    window.loadPyodide = loadPyodide;
  </script>

  <!-- Main -->
  <script type="module">
    import { renderNavbar } from './js/navbar.js?v=1.3';
    import { apiRequest, updateProgress, onAuthChange, getProgress } from './js/auth.js?v=1.2';

    renderNavbar('lesson');

    const lessonId = new URLSearchParams(window.location.search).get('id');
    let editor = null;
    let pyodide = null;

    // Auth guard
    onAuthChange(async (user) => {
      if (!user || !lessonId) {
        window.location.href = 'login.html';
        return;
      }
      await initEditor();
      await loadLesson();
      await checkCompletionState();
    });

    // Monaco editor
    async function initEditor() {
      return new Promise((resolve) => {
        window.require(['vs/editor/editor.main'], () => {
          editor = monaco.editor.create(document.getElementById('editorContainer'), {
            value: '',
            language: 'python',
            theme: 'vs-dark',
            automaticLayout: true,
            fontSize: 14,
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            lineNumbers: 'on',
            renderLineHighlight: 'all',
            fontFamily: "'Courier New', monospace",
          });
          resolve();
        });
      });
    }

    // Load lesson data
    async function loadLesson() {
      try {
        const data = await apiRequest(`/api/lessons/${lessonId}`);
        if (!data || !data.lesson) throw new Error('Lesson not found');
        const lesson = data.lesson;
        const diff = lesson.difficulty || 'beginner';

        document.getElementById('contentArea').innerHTML = `
          <a class="back-link" href="dashboard.html">← Back to Dashboard</a>
          <h1 class="lesson-title">${lesson.title || 'Untitled Lesson'}</h1>
          <div class="lesson-meta">
            <span class="meta-badge topic">${lesson.topic || 'General'}</span>
            <span class="meta-badge ${diff}">${diff.charAt(0).toUpperCase() + diff.slice(1)}</span>
          </div>
          <div class="lesson-body">
            ${lesson.content || '<p>No content available.</p>'}
          </div>
          <div class="hint-panel">
            <div class="hint-label">
              <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
                <circle cx="12" cy="12" r="10"/>
                <path d="M12 16v-4M12 8h.01"/>
              </svg>
              Hint
            </div>
            <p>${lesson.hint || 'No hint available.'}</p>
          </div>
        `;

        if (editor) editor.setValue(lesson.starterCode || '');
      } catch (err) {
        document.getElementById('contentArea').innerHTML = `
          <a class="back-link" href="dashboard.html">← Back to Dashboard</a>
          <p style="color:#F87171; margin-top:20px;">Error loading lesson: ${err.message}</p>
        `;
      }
    }

    // Check completion
    async function checkCompletionState() {
      try {
        const progress = await getProgress();
        const record = progress.find(p => p.lessonId === lessonId);
        if (record?.status === 'completed') {
          const btn = document.getElementById('completeBtn');
          btn.textContent = 'Completed';
          btn.classList.add('done');
          btn.disabled = true;
        }
      } catch { /* silent */ }
    }

    // Pyodide runtime
    async function initPyodideRuntime() {
      if (pyodide) return pyodide;
      document.getElementById('output').textContent = 'Loading Python runtime...';
      pyodide = await window.loadPyodide();
      document.getElementById('output').textContent = 'Python ready. Click Run Code.';
      return pyodide;
    }

    // Run code
    document.getElementById('runBtn').addEventListener('click', async () => {
      const btn = document.getElementById('runBtn');
      btn.textContent = 'Running...';
      btn.disabled = true;
      try {
        const py = await initPyodideRuntime();
        const code = editor.getValue();
        let output = '';
        py.setStdout({ batched: t => { output += t + '\n'; } });
        py.setStderr({ batched: t => { output += 'Error: ' + t + '\n'; } });
        await py.runPythonAsync(code);
        document.getElementById('output').textContent = output.trim() || '(no output)';
      } catch (err) {
        document.getElementById('output').textContent = 'Error: ' + String(err);
      } finally {
        btn.textContent = 'Run Code';
        btn.disabled = false;
      }
    });

    // Mark complete
    document.getElementById('completeBtn').addEventListener('click', async () => {
      const btn = document.getElementById('completeBtn');
      if (btn.disabled) return;
      try {
        btn.textContent = 'Saving...';
        btn.disabled = true;
        await updateProgress(lessonId, 'completed');
        btn.textContent = 'Completed';
        btn.classList.add('done');
        const out = document.getElementById('output');
        out.textContent = 'Lesson marked as complete! Well done.';
        out.style.color = '#4ADE80';
      } catch (err) {
        btn.textContent = 'Mark Complete';
        btn.disabled = false;
        document.getElementById('output').textContent = 'Failed to save: ' + err.message;
      }
    });
  </script>

</body>
</html>
