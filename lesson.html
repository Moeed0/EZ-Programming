<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Interactive Python lesson with code editor." />
  <title>Lesson - EZ Programming</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="css/style.css" />

  <style>
    body {
      margin: 0;
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #fff;
    }

    .lesson-container {
      display: grid;
      grid-template-columns: 1fr 1fr;
      min-height: 100vh;
    }

    .lesson-content-panel {
      padding: 30px;
      overflow-y: auto;
      background: #111827;
    }

    .lesson-editor-panel {
      display: flex;
      flex-direction: column;
      background: #020617;
      border-left: 1px solid #1e293b;
    }

    .editor-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border-bottom: 1px solid #1e293b;
      background: #111827;
    }

    .editor-toolbar-title {
      font-weight: 600;
    }

    .editor-container {
      flex: 1;
      min-height: 400px;
    }

    .output-panel {
      height: 220px;
      border-top: 1px solid #1e293b;
      display: flex;
      flex-direction: column;
      background: #0f172a;
    }

    .output-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #1e293b;
    }

    .output-content {
      padding: 15px;
      overflow-y: auto;
      white-space: pre-wrap;
      font-family: monospace;
      flex: 1;
      color: #e2e8f0;
    }

    .output-content.error {
      color: #f87171;
    }

    .output-content.success {
      color: #4ade80;
    }

    .btn {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 600;
    }

    .btn-sm {
      padding: 7px 12px;
      font-size: 0.85rem;
    }

    .btn-secondary {
      background: #2563eb;
      color: white;
    }

    .btn-outline {
      background: transparent;
      border: 1px solid #475569;
      color: #cbd5e1;
    }

    .btn-success {
      background: #16a34a;
      color: white;
    }

    .hint-panel {
      margin-top: 24px;
      padding: 18px;
      border-radius: 12px;
      background: #1e293b;
      border: 1px solid #334155;
    }

    pre {
      background: #020617;
      padding: 14px;
      border-radius: 10px;
      overflow-x: auto;
    }

    @media (max-width: 900px) {
      .lesson-container {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <div id="navbar"></div>

  <div class="lesson-container">
    <div class="lesson-content-panel" id="lessonContentPanel">
      <div class="loading-container" id="loadingSpinner">
        <div class="spinner"></div>
        <p>Loading lesson...</p>
      </div>
    </div>

    <div class="lesson-editor-panel">
      <div class="editor-toolbar">
        <span class="editor-toolbar-title">Python Editor</span>
        <div style="display:flex; gap:10px;">
          <button class="btn btn-secondary btn-sm" id="runBtn">Run Code</button>
          <button class="btn btn-outline btn-sm" id="resetBtn">Reset</button>
        </div>
      </div>

      <div id="editorContainer" class="editor-container"></div>

      <div class="output-panel">
        <div class="output-header">
          <span>Output</span>
          <button class="btn btn-outline btn-sm" id="clearOutputBtn">Clear</button>
        </div>
        <div class="output-content" id="outputContent">
          Click "Run Code" to see output here...
        </div>
      </div>
    </div>
  </div>

  <!-- Monaco Editor -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
  <!-- Pyodide -->
  <script src="https://cdn.jsdelivr.net/pyodide/v0.24.1/full/pyodide.js"></script>

  <script type="module">
    import {
      renderNavbar,
      showToast
    } from './js/navbar.js?v=1.1';

    import {
      apiRequest,
      getCurrentUser,
      onAuthChange,
      updateProgress,
      getProgress
    } from './js/auth.js?v=1.1';

    renderNavbar('lesson');

    const urlParams = new URLSearchParams(window.location.search);
    const lessonId = urlParams.get('id');

    let editor = null;
    let pyodide = null;
    let currentStarterCode = '';
    let currentLesson = null;

    // ============================================
    // AUTH & LOAD LESSON
    // ============================================

    onAuthChange(async (user) => {
      if (!user) {
        window.location.href = 'login.html';
        return;
      }
      if (!lessonId) {
        showToast('Invalid lesson ID', 'error');
        return;
      }
      await loadLesson();
    });

    // ============================================
    // LOAD LESSON
    // ============================================

    async function loadLesson() {
      try {
        document.getElementById('loadingSpinner').style.display = 'flex';

        const data = await apiRequest(`/api/lessons/${lessonId}`);

        if (!data || !data.lesson) {
          throw new Error('Lesson not found');
        }

        currentLesson = data.lesson;
        renderLessonContent(currentLesson);
        await syncProgress();

      } catch (error) {
        console.error(error);
        document.getElementById('lessonContentPanel').innerHTML = `
          <div style="padding:40px; text-align:center;">
            <h2>Error Loading Lesson</h2>
            <p>${error.message}</p>
            <a href="dashboard.html" style="color:#3b82f6; margin-top:20px; display:inline-block;">
              ← Back to Dashboard
            </a>
          </div>
        `;
      } finally {
        document.getElementById('loadingSpinner').style.display = 'none';
      }
    }

    // ============================================
    // RENDER LESSON
    // ============================================

    function renderLessonContent(lesson) {
      document.title = `${lesson.title} - EZ Programming`;

      let html = `
        <a href="dashboard.html" style="color:#3b82f6; text-decoration:none; display:inline-block; margin-bottom:20px;">
          ← Back to Dashboard
        </a>

        <h1>${lesson.title}</h1>
        <p><strong>Topic:</strong> ${lesson.topic} | <strong>Difficulty:</strong> ${lesson.difficulty}</p>

        <div style="margin-top:30px;">
          ${lesson.content || '<p>No detailed content available yet.</p>'}
        </div>

        <div class="hint-panel">
          <h3>Hint</h3>
          <p>${lesson.hint || 'No hint available.'}</p>
        </div>

        <div style="margin-top:30px;" id="completeSection">
          <button class="btn btn-success" id="markCompleteBtn">
            Mark as Completed
          </button>
        </div>
      `;

      document.getElementById('lessonContentPanel').innerHTML = html;

      // Attach mark complete button
      const markBtn = document.getElementById('markCompleteBtn');
      if (markBtn) {
        markBtn.addEventListener('click', markLessonComplete);
      }

      // Set starter code
      currentStarterCode = lesson.starterCode || 'print("Hello World")';
      initEditor(currentStarterCode);
    }

    // ============================================
    // SYNC PROGRESS
    // ============================================

    async function syncProgress() {
      try {
        const progressData = await getProgress();
        if (!Array.isArray(progressData)) return;

        const found = progressData.find(p => String(p.lessonId) === String(lessonId));

        if (found && found.status === 'completed') {
          const btn = document.getElementById('markCompleteBtn');
          if (btn) {
            btn.textContent = 'Completed ✓';
            btn.disabled = true;
          }
        }
      } catch (err) {
        console.error('Progress sync error:', err);
      }
    }

    // ============================================
    // MARK COMPLETE
    // ============================================

    async function markLessonComplete() {
      const btn = document.getElementById('markCompleteBtn');
      if (!btn) return;

      try {
        btn.disabled = true;
        btn.textContent = 'Saving...';

        await updateProgress(lessonId, 'completed');

        btn.textContent = 'Completed ✓';
        showToast('Lesson marked as completed!', 'success');

      } catch (error) {
        console.error(error);
        btn.disabled = false;
        btn.textContent = 'Mark as Completed';
        showToast('Failed to save progress', 'error');
      }
    }

    // ============================================
    // MONACO EDITOR
    // ============================================

    function initEditor(starterCode) {
      require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });

      window.MonacoEnvironment = {
        getWorkerUrl: () => `data:text/javascript;charset=utf-8,${encodeURIComponent(`
          self.MonacoEnvironment = { baseUrl: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/' };
          importScripts('https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/base/worker/workerMain.js');
        `)}`
      };

      require(['vs/editor/editor.main'], () => {
        editor = monaco.editor.create(document.getElementById('editorContainer'), {
          value: starterCode,
          language: 'python',
          theme: 'vs-dark',
          automaticLayout: true,
          fontSize: 14,
          wordWrap: 'on',
          minimap: { enabled: false }
        });
      });
    }

    // ============================================
    // PYODIDE
    // ============================================

    async function initPyodide() {
      const outputEl = document.getElementById('outputContent');
      try {
        outputEl.textContent = 'Loading Python environment...';
        pyodide = await loadPyodide({ indexURL: 'https://cdn.jsdelivr.net/pyodide/v0.24.1/full/' });
        outputEl.textContent = 'Python ready ✓';
      } catch (error) {
        console.error(error);
        outputEl.textContent = 'Failed to load Python environment.';
        outputEl.classList.add('error');
      }
    }

    // ============================================
    // RUN CODE
    // ============================================

    async function runCode() {
      if (!editor || !pyodide) return;

      const outputEl = document.getElementById('outputContent');
      const runBtn = document.getElementById('runBtn');

      runBtn.disabled = true;
      runBtn.textContent = 'Running...';
      outputEl.className = 'output-content';
      outputEl.textContent = '';

      try {
        const code = editor.getValue();

        pyodide.runPython(`
import sys
from io import StringIO
sys.stdout = StringIO()
sys.stderr = StringIO()
        `);

        await pyodide.runPythonAsync(code);

        const stdout = pyodide.runPython('sys.stdout.getvalue()');
        const stderr = pyodide.runPython('sys.stderr.getvalue()');

        if (stderr) {
          outputEl.textContent = stderr;
          outputEl.classList.add('error');
        } else {
          outputEl.textContent = stdout || '(No output)';
          outputEl.classList.add('success');
        }
      } catch (error) {
        outputEl.textContent = error.message;
        outputEl.classList.add('error');
      } finally {
        runBtn.disabled = false;
        runBtn.textContent = 'Run Code';
      }
    }

    // ============================================
    // BUTTON EVENTS
    // ============================================

    document.getElementById('runBtn').addEventListener('click', runCode);
    document.getElementById('resetBtn').addEventListener('click', () => {
      if (editor) editor.setValue(currentStarterCode);
      document.getElementById('outputContent').textContent = 'Code reset successfully.';
    });
    document.getElementById('clearOutputBtn').addEventListener('click', () => {
      document.getElementById('outputContent').textContent = '';
    });

    // ============================================
    // INIT
    // ============================================

    async function init() {
      await initPyodide();
    }

    init();
  </script>
</body>

</html>
